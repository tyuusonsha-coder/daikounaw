<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>クーポン確認（店舗用）| 代行なう</title>
<style>
:root{--bg:#0a0a12;--panel:#14141f;--line:#26263a;--green:#39ff88;--red:#ff2547;--gold:#ffd23f;--cyan:#00e5ff;--tx:#eef0ff;--dim:#8b8da6;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;min-height:100vh;}
.wrap{max-width:440px;margin:0 auto;padding:20px 16px;}
.top{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.back{text-decoration:none;color:var(--dim);font-size:12px;border:1px solid var(--line);border-radius:8px;padding:6px 10px;}
h1{font-size:18px;font-weight:900;}
h1 small{display:block;font-size:11px;color:var(--dim);font-weight:400;margin-top:2px;letter-spacing:.08em;}
.box{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
.lbl{font-size:13px;color:var(--cyan);font-weight:bold;margin-bottom:8px;letter-spacing:.05em;}
.inp{width:100%;background:#05050a;border:1px solid var(--line);border-radius:10px;padding:14px;color:#fff;font-size:20px;font-weight:900;letter-spacing:.12em;text-align:center;outline:none;text-transform:uppercase;font-family:inherit;}
.inp:focus{border-color:var(--cyan);}
.btn{width:100%;margin-top:12px;padding:15px;border:0;border-radius:12px;font-size:16px;font-weight:900;letter-spacing:.1em;cursor:pointer;font-family:inherit;background:linear-gradient(180deg,var(--cyan),#00a5bb);color:#022;}
.btn:active{transform:translateY(1px);}
.result{margin-top:4px;}
.card{border-radius:14px;padding:20px;text-align:center;border:1px solid var(--line);}
.card.ok{background:rgba(57,255,136,.08);border-color:var(--green);}
.card.used{background:rgba(255,37,71,.07);border-color:var(--red);}
.card.none{background:rgba(139,141,166,.06);border-color:var(--dim);}
.card .icon{font-size:42px;}
.card .st{font-size:20px;font-weight:900;margin:8px 0 4px;}
.card.ok .st{color:var(--green);}
.card.used .st{color:var(--red);}
.card.none .st{color:var(--dim);}
.card .prize{font-size:16px;font-weight:800;color:var(--gold);margin:6px 0;}
.card .meta{font-size:12px;color:var(--dim);line-height:1.6;}
.usebtn{width:100%;margin-top:16px;padding:15px;border:0;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;background:linear-gradient(180deg,var(--gold),#e0a91f);color:#1a1200;letter-spacing:.08em;}
.usebtn:active{transform:translateY(1px);}
.usebtn:disabled{filter:grayscale(.6) brightness(.6);cursor:wait;}
.spin{font-size:13px;color:var(--dim);text-align:center;padding:14px;}
.note{font-size:11px;color:var(--dim);line-height:1.7;margin-top:16px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a href="index.html" class="back">← 代行なう</a>
    <h1>クーポン確認<small>STAFF ONLY ／ 店舗用</small></h1>
  </div>

  <div class="box">
    <div class="lbl">お客様のコードを入力</div>
    <input class="inp" id="codeInp" placeholder="L5-1234" autocomplete="off">
    <button class="btn" id="checkBtn">確認する</button>
  </div>

  <div class="result" id="result"></div>

  <p class="note">お客様がパチンコで交換したクーポンの有効性を確認できます。<br>「使用済みにする」を押すと、そのコードは二度と使えなくなります。</p>
</div>

<script>
"use strict";
var SB="https://kjfmcpwstubgezebmstt.supabase.co/rest/v1/";
var SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZm1jcHdzdHViZ2V6ZWJtc3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODU3MTksImV4cCI6MjA5NDE2MTcxOX0.GF5QPVI4AUCfIqdmApplwOAEDBoESZTfadi-hbOb7Gs";
var H={"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json","Prefer":"return=representation"};

var input=document.getElementById("codeInp");
var resultEl=document.getElementById("result");

function fmtDate(s){
  try{ var d=new Date(s); return d.getFullYear()+"/"+(d.getMonth()+1)+"/"+d.getDate()+" "+("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }
  catch(e){ return ""; }
}

async function checkCode(){
  var code=input.value.trim().toUpperCase();
  if(!code){ return; }
  resultEl.innerHTML='<div class="spin">確認中…</div>';
  var rows;
  try{
    var r=await fetch(SB+"coupons?code=eq."+encodeURIComponent(code)+"&select=*",{headers:H});
    rows=await r.json();
  }catch(e){ rows=null; }

  if(!rows || !rows.length){
    resultEl.innerHTML='<div class="card none"><div class="icon">❓</div><div class="st">無効なコード</div><div class="meta">このコードは存在しません。<br>入力を確認してください。</div></div>';
    return;
  }
  var c=rows[0];
  if(c.used){
    resultEl.innerHTML='<div class="card used"><div class="icon">🚫</div><div class="st">使用済み</div><div class="prize">'+(c.prize||"")+'</div><div class="meta">このコードは既に使われています。<br>使用日時：'+fmtDate(c.used_at)+'</div></div>';
    return;
  }
  // 有効
  resultEl.innerHTML='<div class="card ok"><div class="icon">✅</div><div class="st">有効なクーポン</div><div class="prize">'+(c.prize||"")+'</div><div class="meta">発行日時：'+fmtDate(c.created_at)+'</div></div>'+
    '<button class="usebtn" id="useBtn">このクーポンを使用済みにする</button>';
  document.getElementById("useBtn").addEventListener("click",function(){ markUsed(c.id, this); });
}

async function markUsed(id, btn){
  if(btn){ btn.disabled=true; btn.textContent="処理中…"; }
  try{
    await fetch(SB+"coupons?id=eq."+id,{method:"PATCH",headers:H,body:JSON.stringify({used:true,used_at:new Date().toISOString()})});
  }catch(e){}
  checkCode(); // 再確認して「使用済み」表示に更新
}

document.getElementById("checkBtn").addEventListener("click", checkCode);
input.addEventListener("keydown", function(e){ if(e.key==="Enter") checkCode(); });
</script>
</body>
</html>
