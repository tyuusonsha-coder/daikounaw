
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#080808"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>代行なう — 運転代行マッチング</title>
  <meta name="description" content="福岡エリアの運転代行マッチングアプリ。料金計算・即時予約。中尊社運転代行が運営。"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body,#root{height:100%;margin:0;padding:0;}
    body{background:#080808;font-family:'Noto Sans JP',sans-serif;color:#efefef;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
    input,textarea,button,select{font-family:'Noto Sans JP',sans-serif;}
    a{color:inherit;text-decoration:none;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes ctaPulse{0%,100%{box-shadow:0 4px 20px rgba(255,107,0,.35)}60%{box-shadow:0 4px 32px rgba(255,107,0,.6)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,210,106,.4)}70%{box-shadow:0 0 0 10px rgba(0,210,106,0)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ══════════════════════════════════════
   事業者情報
   ══════════════════════════════════════ */
const BIZ = {
  name: "中尊社運転代行",
  phone: "050-1724-3179",
  lineUrl: "https://lin.ee/kuikkusutaa",
  lineId: "kuikkusutaa",
  area: "那珂川市・福岡市南区・春日市・大野城市・太宰府市",
  hours: "20:00〜翌5:00（年中無休）",
  web: "https://tyuusonshauntendaikou.com",
};

/* ══════════════════════════════════════
   カラーパレット
   ══════════════════════════════════════ */
const C = {
  bg:"#080808", card:"#0f0f0f", s1:"#111", s2:"#151515",
  border:"#1e1e1e", b2:"#252525", b3:"#2e2e2e",
  accent:"#FF6B00", aL:"rgba(255,107,0,.08)",
  green:"#00D26A", gL:"rgba(0,210,106,.08)",
  red:"#FF4757", rL:"rgba(255,71,87,.08)",
  blue:"#4A90FF", bL:"rgba(74,144,255,.08)",
  gold:"#FFD700", text:"#EFEFEF", t2:"#777", t3:"#3a3a3a", t4:"#555",
};

/* ══════════════════════════════════════
   ユーティリティ
   ══════════════════════════════════════ */
const fmtYen = n => `¥${Number(n).toLocaleString()}`;

/* ══════════════════════════════════════
   料金計算
   ══════════════════════════════════════ */
const FARE_TABLE = [
  {maxKm:2,  base:1500, perKm:400},
  {maxKm:5,  base:2200, perKm:350},
  {maxKm:10, base:3400, perKm:300},
  {maxKm:20, base:5400, perKm:250},
  {maxKm:999,base:8000, perKm:200},
];
const calcFare = km => {
  if(!km || km<=0) return null;
  const h = new Date().getHours(), isLate = h>=23 || h<5;
  const tier = FARE_TABLE.find(t => km<=t.maxKm) || FARE_TABLE[4];
  const fare = Math.ceil((tier.base + Math.max(0,km-1)*tier.perKm) * (isLate?1.3:1) / 100)*100;
  return { fare, isLate, km, min:Math.round(fare*.9), max:Math.round(fare*1.1) };
};

// ── 距離計算（Haversine） ──
const SPOTS = {
  "博多駅":{lat:33.5904,lon:130.4207},"天神":{lat:33.5902,lon:130.3976},
  "福岡空港":{lat:33.5839,lon:130.4511},"中洲":{lat:33.5920,lon:130.4065},
  "大橋":{lat:33.5620,lon:130.4213},"春日市":{lat:33.5317,lon:130.4747},
  "香椎":{lat:33.6275,lon:130.4373},"久留米駅":{lat:33.3196,lon:130.5083},
  "太宰府":{lat:33.5126,lon:130.5302},"姪浜":{lat:33.5815,lon:130.3444},
  "那珂川":{lat:33.5025,lon:130.4180},"大野城":{lat:33.5367,lon:130.4778},
  "二日市":{lat:33.5087,lon:130.5133},"薬院":{lat:33.5813,lon:130.3998},
  "西新":{lat:33.5815,lon:130.3650},"六本松":{lat:33.5760,lon:130.3870},
};
const getKm = (from,to) => {
  const f = Object.entries(SPOTS).find(([k])=>from.includes(k));
  const t = Object.entries(SPOTS).find(([k])=>to.includes(k));
  if(!f||!t) return null;
  const R=6371, dL=(t[1].lat-f[1].lat)*Math.PI/180, dO=(t[1].lon-f[1].lon)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(f[1].lat*Math.PI/180)*Math.cos(t[1].lat*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)) * 1.25;
};

/* ══════════════════════════════════════
   エリアマップ（Canvas）
   ══════════════════════════════════════ */
const MAP_SPOTS = {
  "博多駅":{px:0.18,py:0.50},"天神":{px:0.50,py:0.28},"中洲":{px:0.50,py:0.50},
  "大橋":{px:0.50,py:0.72},"福岡空港":{px:0.82,py:0.28},"春日市":{px:0.82,py:0.72},
  "久留米駅":{px:0.15,py:0.82},"姪浜":{px:0.15,py:0.28},
  "太宰府":{px:0.68,py:0.82},"那珂川":{px:0.82,py:0.72},"大野城":{px:0.68,py:0.65},
  "薬院":{px:0.42,py:0.38},"西新":{px:0.30,py:0.28},"六本松":{px:0.38,py:0.42},
};
const findSpot = q => {
  if(!q) return null;
  const key = Object.keys(MAP_SPOTS).find(k => q.includes(k));
  return key ? MAP_SPOTS[key] : null;
};

function AreaMap({fromSpot, toSpot}) {
  const cvRef = useRef(null);

  useEffect(() => {
    const cv = cvRef.current; if(!cv) return;
    const ctx = cv.getContext("2d");
    const W = cv.width, H = cv.height;
    ctx.fillStyle = "#050508"; ctx.fillRect(0,0,W,H);

    // グリッド
    ctx.strokeStyle = "rgba(255,107,0,.05)"; ctx.lineWidth = 0.5;
    for(let x=0;x<W;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // 主要道路
    const roads = [[0,H*.5,W,H*.5],[W*.5,0,W*.5,H],[W*.18,0,W*.18,H],[W*.82,0,W*.82,H],[0,H*.28,W,H*.28],[0,H*.72,W,H*.72]];
    roads.forEach(([x1,y1,x2,y2],i) => {
      ctx.shadowColor = "rgba(255,107,0,.4)"; ctx.shadowBlur = 6;
      ctx.strokeStyle = i<2?"rgba(255,107,0,.3)":"rgba(255,107,0,.15)";
      ctx.lineWidth = i<2?2.5:1.5;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.shadowBlur = 0;
    });

    // 地名ラベル
    const areas = [["博多駅",W*.18,H*.5],["天神",W*.5,H*.28],["中洲",W*.5,H*.5],["大橋",W*.5,H*.72],["福岡空港",W*.82,H*.28],["那珂川",W*.82,H*.72]];
    areas.forEach(([name,x,y]) => {
      ctx.fillStyle = "rgba(255,255,255,.18)";
      ctx.font = "9px 'Noto Sans JP',sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(name, x, y+14);
      // 地点ドット
      ctx.fillStyle = "rgba(255,107,0,.25)";
      ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    });

    // 出発地・目的地の経路
    if(fromSpot && toSpot) {
      const fx = fromSpot.px*W, fy = fromSpot.py*H;
      const tx = toSpot.px*W, ty = toSpot.py*H;
      ctx.shadowColor = C.green; ctx.shadowBlur = 8;
      ctx.strokeStyle = C.green; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur = 0;
      // 出発マーカー
      ctx.fillStyle = C.green; ctx.shadowColor = C.green; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(fx,fy,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.shadowBlur = 0;
      ctx.font = "bold 8px sans-serif"; ctx.fillText("出発",fx,fy+18);
      // 目的地マーカー
      ctx.fillStyle = C.red; ctx.shadowColor = C.red; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(tx,ty,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.shadowBlur = 0;
      ctx.fillText("到着",tx,ty+18);
    }
  }, [fromSpot, toSpot]);

  return (
    <div style={{width:"100%", borderRadius:16, overflow:"hidden", border:`1px solid rgba(255,107,0,.2)`, background:"#050508", position:"relative"}}>
      <canvas ref={cvRef} width={360} height={220} style={{width:"100%", height:220, display:"block"}}/>
      <div style={{position:"absolute", bottom:0, left:0, right:0, padding:"6px 10px", background:"rgba(5,5,8,.85)", display:"flex", gap:10, fontSize:10}}>
        <span style={{color:"rgba(255,107,0,.5)"}}>● エリア</span>
        {fromSpot && <span style={{color:C.green}}>● 出発</span>}
        {toSpot && <span style={{color:C.red}}>● 目的地</span>}
        <span style={{marginLeft:"auto", color:C.t2}}>福岡エリア</span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   営業時間判定
   ══════════════════════════════════════ */
function useBusinessStatus() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 60000);
    return () => clearInterval(t);
  }, []);
  const h = now.getHours();
  const isOpen = h >= 20 || h < 5;
  const isLate = h >= 23 || h < 5;
  let nextOpen = "";
  if(!isOpen) {
    nextOpen = "本日 20:00 から営業開始";
  }
  return { isOpen, isLate, nextOpen, now };
}

/* ══════════════════════════════════════
   📏 料金計算画面
   ══════════════════════════════════════ */
function FareScreen() {
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");
  const [result, setResult] = useState(null);
  const [searching, setSearching] = useState(false);
  const { isOpen, isLate } = useBusinessStatus();
  const fromSpot = findSpot(from);
  const toSpot = findSpot(to);

  const doSearch = () => {
    if(!from.trim()||!to.trim()) return;
    setSearching(true);
    setTimeout(() => {
      const km = getKm(from, to);
      if(km) {
        const fare = calcFare(km);
        setResult({km, fare, minutes: Math.round(km/30*60+5), found:true});
      } else {
        setResult({found:false});
      }
      setSearching(false);
    }, 400);
  };

  const openGoogleMaps = () => {
    if(!from.trim()||!to.trim()) return;
    window.open(`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(from+" 福岡")}&destination=${encodeURIComponent(to+" 福岡")}&travelmode=driving`, "_blank");
  };

  const inpS = {width:"100%", background:"transparent", border:"none", color:C.text, fontSize:16, outline:"none", fontFamily:"inherit", padding:0};

  return (
    <div style={{paddingBottom:80}}>
      <div style={{padding:"14px 16px 0"}}>
        <div style={{fontSize:18, fontWeight:900, marginBottom:2}}>📏 料金計算</div>
        <div style={{fontSize:12, color:C.t2, marginBottom:12}}>出発地と目的地を入力して料金の目安を確認</div>

        {/* 入力フォーム */}
        <div style={{background:"linear-gradient(135deg,#1a0800,#0d0400)", borderRadius:20, padding:4, border:`1px solid rgba(255,107,0,.35)`, boxShadow:"0 0 20px rgba(255,107,0,.08)", marginBottom:12}}>
          <div style={{background:C.s2, borderRadius:16, padding:"13px 16px", marginBottom:2, display:"flex", alignItems:"center", gap:12}}>
            <div style={{width:12, height:12, borderRadius:"50%", background:C.green, flexShrink:0, boxShadow:`0 0 8px ${C.green}`}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:10, color:C.green, fontWeight:700, marginBottom:4, letterSpacing:.5}}>出発地</div>
              <input value={from} onChange={e=>{setFrom(e.target.value);setResult(null);}} onKeyDown={e=>{if(e.key==="Enter")doSearch();}}
                placeholder="例：博多駅、天神、中洲" style={{...inpS, fontSize:17, fontWeight:500}}/>
            </div>
            {from && <button onClick={()=>{setFrom("");setResult(null);}} style={{background:"none",border:"none",color:C.t3,fontSize:18,cursor:"pointer",padding:0}}>×</button>}
          </div>
          <div style={{display:"flex", justifyContent:"center", alignItems:"center", padding:"2px 0", position:"relative"}}>
            <div style={{flex:1, height:1, background:`linear-gradient(90deg,transparent,rgba(255,107,0,.3))`}}/>
            <div style={{width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg,#FF6B00,#FF3D00)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0, margin:"0 8px", boxShadow:"0 0 10px rgba(255,107,0,.4)"}}>↓</div>
            <div style={{flex:1, height:1, background:`linear-gradient(90deg,rgba(255,107,0,.3),transparent)`}}/>
          </div>
          <div style={{background:C.s2, borderRadius:16, padding:"13px 16px", marginTop:2, display:"flex", alignItems:"center", gap:12}}>
            <div style={{width:12, height:12, borderRadius:3, background:C.red, flexShrink:0, boxShadow:`0 0 8px ${C.red}`}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:10, color:C.red, fontWeight:700, marginBottom:4, letterSpacing:.5}}>目的地</div>
              <input value={to} onChange={e=>{setTo(e.target.value);setResult(null);}} onKeyDown={e=>{if(e.key==="Enter")doSearch();}}
                placeholder="例：大橋、春日市、那珂川" style={{...inpS, fontSize:17, fontWeight:500}}/>
            </div>
            {to && <button onClick={()=>{setTo("");setResult(null);}} style={{background:"none",border:"none",color:C.t3,fontSize:18,cursor:"pointer",padding:0}}>×</button>}
          </div>
        </div>

        {/* クイック入力 */}
        <div style={{display:"flex", gap:6, overflowX:"auto", paddingBottom:6, marginBottom:12}}>
          {["博多駅","天神","中洲","大橋","那珂川","春日市","太宰府","薬院"].map(s=>(
            <button key={s} onClick={()=>{if(!from)setFrom(s);else if(!to)setTo(s);}}
              style={{flexShrink:0, background:C.s2, border:`1px solid ${C.b2}`, borderRadius:20, padding:"6px 12px", fontSize:12, color:C.t2, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap"}}>{s}</button>
          ))}
        </div>

        {/* ボタン */}
        <div style={{display:"flex", gap:10, marginBottom:14}}>
          <button onClick={doSearch} disabled={!from||!to||searching}
            style={{flex:2, padding:"14px 0", background:from&&to&&!searching?"linear-gradient(135deg,#FF6B00,#FF3D00)":"#2a2a2a", color:from&&to&&!searching?"#000":"#555", border:"none", borderRadius:14, fontWeight:900, fontSize:15, cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8}}>
            {searching?<><span style={{display:"inline-block",animation:"spin .6s linear infinite"}}>⟳</span> 計算中...</>:"📏 料金を計算する"}
          </button>
          <button onClick={openGoogleMaps} disabled={!from||!to}
            style={{flex:1, padding:"14px 0", background:from&&to?"rgba(26,115,232,.15)":"#2a2a2a", color:from&&to?"#4A90FF":"#555", border:from&&to?`1px solid rgba(74,144,255,.4)`:`1px solid ${C.b2}`, borderRadius:14, fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit"}}>
            🗺️ Gマップ
          </button>
        </div>
      </div>

      {/* マップ */}
      <div style={{padding:"0 16px 14px"}}>
        <AreaMap fromSpot={fromSpot} toSpot={toSpot}/>
      </div>

      {/* 計算結果 */}
      {result && result.found && (
        <div style={{padding:"0 16px 14px", animation:"fadeIn .3s ease"}}>
          <div style={{background:"linear-gradient(135deg,rgba(255,107,0,.1),rgba(255,61,0,.05))", borderRadius:18, padding:16, border:`1px solid rgba(255,107,0,.3)`, marginBottom:14}}>
            <div style={{fontSize:12, color:C.accent, fontWeight:800, marginBottom:12, display:"flex", alignItems:"center", gap:6}}>
              <span style={{width:6,height:6,borderRadius:"50%",background:C.accent,display:"inline-block"}}/>
              ルート情報 · {from} → {to}
            </div>
            <div style={{textAlign:"center", marginBottom:14, padding:"14px 0", borderBottom:`1px solid rgba(255,107,0,.2)`}}>
              <div style={{fontSize:11, color:C.t2, marginBottom:4}}>推定代行料金</div>
              <div style={{fontSize:42, fontWeight:900, color:C.accent, lineHeight:1}}>{result.fare?fmtYen(result.fare.fare):"—"}</div>
              {result.fare && <div style={{fontSize:12, color:C.t2, marginTop:6}}>{fmtYen(result.fare.min)} 〜 {fmtYen(result.fare.max)}{result.fare.isLate&&<span style={{color:"#AA00FF",marginLeft:6}}>🌙 深夜割増+30%</span>}</div>}
            </div>
            <div style={{display:"flex", gap:8}}>
              {[
                {icon:"📍", label:"距離", val:`${result.km.toFixed(1)}km`, col:C.blue},
                {icon:"⏱", label:"所要時間", val:`約${result.minutes}分`, col:C.green},
              ].map(({icon,label,val,col})=>(
                <div key={label} style={{flex:1, background:`${col}0d`, borderRadius:10, padding:"10px 4px", textAlign:"center", border:`1px solid ${col}22`}}>
                  <div style={{fontSize:14, marginBottom:2}}>{icon}</div>
                  <div style={{fontSize:14, fontWeight:800, color:col}}>{val}</div>
                  <div style={{fontSize:9, color:C.t2, marginTop:2}}>{label}</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:12, fontSize:11, color:C.t3, textAlign:"center", lineHeight:1.7}}>
              ※ 料金は目安です。実際の料金は経路・交通状況により変動します<br/>
              ※ 正確な料金はお電話・LINEでお問い合わせください
            </div>
          </div>

          {/* 予約CTA */}
          <div style={{display:"flex", gap:8}}>
            <a href={`tel:${BIZ.phone}`} style={{flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"14px 0", background:"linear-gradient(135deg,#00D26A,#00a050)", color:"#fff", borderRadius:14, fontWeight:900, fontSize:15, textDecoration:"none"}}>📞 電話で予約</a>
            <a href={BIZ.lineUrl} target="_blank" rel="noopener" style={{flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"14px 0", background:"#06C755", color:"#fff", borderRadius:14, fontWeight:900, fontSize:15, textDecoration:"none"}}>💬 LINE予約</a>
          </div>
        </div>
      )}

      {/* 地名が見つからない場合 */}
      {result && !result.found && (
        <div style={{padding:"0 16px 14px", animation:"fadeIn .3s ease"}}>
          <div style={{background:C.rL, borderRadius:14, padding:16, border:`1px solid ${C.red}33`, marginBottom:14}}>
            <div style={{fontSize:14, fontWeight:700, color:C.red, marginBottom:6}}>📍 地名が見つかりませんでした</div>
            <div style={{fontSize:12, color:C.t2, lineHeight:1.7, marginBottom:12}}>
              対応地名：博多駅、天神、中洲、大橋、那珂川、春日市、太宰府、福岡空港、薬院、西新、六本松、姪浜、香椎、久留米駅、大野城、二日市
            </div>
            <div style={{fontSize:12, color:C.t2, lineHeight:1.7}}>
              上記以外の地名は、Googleマップで距離を確認するか、お電話・LINEで直接お問い合わせください。
            </div>
          </div>
          <div style={{display:"flex", gap:8}}>
            <button onClick={openGoogleMaps} style={{flex:1, padding:"13px 0", background:"rgba(26,115,232,.15)", color:"#4A90FF", border:`1px solid rgba(74,144,255,.4)`, borderRadius:14, fontWeight:700, fontSize:14, cursor:"pointer", fontFamily:"inherit"}}>🗺️ Googleマップで確認</button>
