// ══ SUPABASE CONFIG ══
// ⚠️ 以下の2行をSupabaseのProject URLとAnon Keyに書き換えてください
const SUPABASE_URL = "https://your-project.supabase.co";
const SUPABASE_ANON_KEY = "your-anon-key-here";


// Supabaseクライアント（CDN版・軽量ラッパー）
const supabase = (() => {
  const headers = {
    "apikey": SUPABASE_ANON_KEY,
    "Content-Type": "application/json",
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  };
  const authHeaders = (token) => ({
    ...headers,
    "Authorization": `Bearer ${token || SUPABASE_ANON_KEY}`,
  });
  const base = `${SUPABASE_URL}/rest/v1`;
  const authBase = `${SUPABASE_URL}/auth/v1`;


  // セッション管理
  let _session = null;
  const SESSION_KEY = "daiko_session";
  const loadSession = () => {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; }
  };
  const saveSession = (s) => {
    _session = s;
    if (s) localStorage.setItem(SESSION_KEY, JSON.stringify(s));
    else localStorage.removeItem(SESSION_KEY);
  };
  _session = loadSession();


  return {
    getSession: () => _session,


    // 新規登録
    signUp: async ({ email, password, name, address, role }) => {
      const r = await fetch(`${authBase}/signup`, {
        method: "POST", headers,
        body: JSON.stringify({ email, password, data: { name } }),
      }).then(r => r.json());
      if (r.error) return { error: r.error };
      saveSession(r);
      // profilesテーブルに追加情報を保存
      if (r.access_token) {
        await fetch(`${base}/profiles`, {
          method: "POST",
          headers: { ...authHeaders(r.access_token), "Prefer": "return=minimal" },
          body: JSON.stringify({ id: r.user.id, name, email, address: address || "", role: role || "user" }),
        });
      }
      return { data: r };
    },


    // ログイン
    signIn: async ({ email, password }) => {
      const r = await fetch(`${authBase}/token?grant_type=password`, {
        method: "POST", headers,
        body: JSON.stringify({ email, password }),
      }).then(r => r.json());
      if (r.error) return { error: r.error };
      saveSession(r);
      return { data: r };
    },


    // ログアウト
    signOut: async () => {
      const token = _session?.access_token;
      saveSession(null);
      if (token) await fetch(`${authBase}/logout`, {
        method: "POST", headers: authHeaders(token),
      }).catch(() => {});
      return { error: null };
    },


    // プロフィール取得
    getProfile: async () => {
      const token = _session?.access_token;
      const uid = _session?.user?.id;
      if (!token || !uid) return { data: null };
      const r = await fetch(`${base}/profiles?id=eq.${uid}&select=*`, {
        headers: authHeaders(token),
      }).then(r => r.json());
      return { data: Array.isArray(r) ? r[0] : null };
    },


    // プロフィール更新
    updateProfile: async (updates) => {
      const token = _session?.access_token;
      const uid = _session?.user?.id;
      if (!token || !uid) return { error: "未ログイン" };
      const r = await fetch(`${base}/profiles?id=eq.${uid}`, {
        method: "PATCH",
        headers: { ...authHeaders(token), "Prefer": "return=minimal" },
        body: JSON.stringify({ ...updates, updated_at: new Date().toISOString() }),
      });
      return { error: r.ok ? null : "更新失敗" };
    },


    // トークンリフレッシュ
    refreshSession: async () => {
      const refresh_token = _session?.refresh_token;
      if (!refresh_token) return null;
      const r = await fetch(`${authBase}/token?grant_type=refresh_token`, {
        method: "POST", headers,
        body: JSON.stringify({ refresh_token }),
      }).then(r => r.json()).catch(() => null);
      if (r?.access_token) { saveSession(r); return r; }
      saveSession(null); return null;
    },
  };
})();

const agoCache=new Map();
const ago=ts=>{
  const bucket=Math.floor((Date.now()-ts)/5000);
  const key=`${ts}:${bucket}`;
  if(agoCache.has(key))return agoCache.get(key);
  const s=Math.floor((Date.now()-ts)/1000);
  const r=s<60?`${s}秒前`:s<3600?`${Math.floor(s/60)}分前`:s<86400?`${Math.floor(s/3600)}時間前`:`${Math.floor(s/86400)}日前`;
  if(agoCache.size>200)agoCache.clear();
  agoCache.set(key,r);return r;
};

// ══ 料金計算エンジン ══
const FARE_TABLE=[
  {maxKm:2,  base:1500, perKm:400},
  {maxKm:5,  base:2200, perKm:350},
  {maxKm:10, base:3400, perKm:300},
  {maxKm:20, base:5400, perKm:250},
  {maxKm:999,base:8000, perKm:200},
];
const calcFare=(km,opts={})=>{
  if(!km||km<=0)return null;
  const tier=FARE_TABLE.find(t=>km<=t.maxKm)||FARE_TABLE[FARE_TABLE.length-1];
  let fare=tier.base+Math.max(0,km-1)*tier.perKm;
  const h=new Date().getHours();
  const isLate=(h>=23||h<5);
  if(isLate)fare=Math.round(fare*1.3);
  if(opts.holiday)fare=Math.round(fare*1.2);
  fare=Math.ceil(fare/100)*100; // 100円単位切り上げ
  return{fare,isLate,km,tier,min:Math.round(fare*0.9),max:Math.round(fare*1.1)};
};
const fareLabel=r=>r?`${fmtYen(r.fare)}${r.isLate?" 🌙深夜料金含む":""}`:null;
const calcKmSimple=(la1,lo1,la2,lo2)=>{
  const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

function ChatModal({post,me,users,onClose}){

// 投稿フォーム（距離自動計算料金）
function PostForm({me,onPost,onClose}){
  const [type,setType]=useState("request");
  const [from,setFrom]=useState("");
  const [to,setTo]=useState("");
  const [note,setNote]=useState("");
  const [err,setErr]=useState("");
  const [fareResult,setFareResult]=useState(null); // {fare, isLate, km, min, max}
  const [calcStatus,setCalcStatus]=useState(""); // "" | "loading" | "done" | "error"
  const [showTable,setShowTable]=useState(false);
  const inp={width:"100%",background:"transparent",border:"none",padding:0,color:C.text,fontSize:15,outline:"none",fontFamily:"inherit"};
  const calcTimer=useRef(null);


  // 出発地・目的地が両方入ったら自動計算
  useEffect(()=>{
    if(!from.trim()||!to.trim()){setFareResult(null);setCalcStatus("");return;}
    clearTimeout(calcTimer.current);
    calcTimer.current=setTimeout(async()=>{
      setCalcStatus("loading");setFareResult(null);
      try{
        const[fr,t2]=await Promise.all([
          fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(from+" 福岡")}&format=json&limit=1`).then(r=>r.json()),
          fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(to+" 福岡")}&format=json&limit=1`).then(r=>r.json()),
        ]);
        if(!fr.length||!t2.length){setCalcStatus("error");return;}
        const km=calcKmSimple(parseFloat(fr[0].lat),parseFloat(fr[0].lon),parseFloat(t2[0].lat),parseFloat(t2[0].lon));
        const result=calcFare(km);
        setFareResult(result);setCalcStatus("done");
      }catch{setCalcStatus("error");}
    },800);
    return()=>clearTimeout(calcTimer.current);
  },[from,to]);


  const submit=()=>{
    if(!from.trim()||!to.trim()){setErr("出発地と目的地を入力してください");return;}
    if(type==="request"&&!fareResult){setErr("料金を計算中です。少し待ってください");return;}
    onPost({from,to,price:fareResult?fareResult.fare:0,km:fareResult?.km,timing:"今すぐ",note,type,fareResult});
    onClose();
  };


  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:150,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div style={{background:C.s1,borderRadius:"20px 20px 0 0",padding:"20px 16px 36px",maxHeight:"92vh",overflowY:"auto",border:`1px solid ${C.b2}`,borderBottom:"none"}}>
        <div style={{width:36,height:3,borderRadius:2,background:C.b3,margin:"0 auto 18px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <span style={{fontSize:17,fontWeight:900}}>投稿する</span>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.t2,fontSize:24,cursor:"pointer",lineHeight:1}}>×</button>
        </div>


        {/* タイプ切替 */}
        <div style={{display:"flex",gap:6,marginBottom:18,background:C.s2,borderRadius:14,padding:4}}>
          {[["request","🚗 代行依頼"],["kaeri","🔄 帰り便"]].map(([v,l])=>(
            <button key={v} onClick={()=>setType(v)} style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",background:type===v?"linear-gradient(135deg,#FF6B00,#FF3D00)":"transparent",color:type===v?"#000":C.t2}}>{l}</button>
          ))}
        </div>


        {type==="kaeri"&&<div style={{background:C.bL,border:`1px solid ${C.blue}22`,borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:12,color:C.blue}}>💡 帰り便は無料で募集できます。乗客が見つかれば料金交渉が可能です。</div>}


        {/* ルート入力 */}
        <div style={{background:C.s2,borderRadius:16,padding:"14px",marginBottom:type==="request"?0:14,border:`1px solid ${fareResult?C.accent+"44":C.b2}`,transition:"border-color .3s"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:C.green,flexShrink:0,boxShadow:`0 0 6px ${C.green}`}}/>
            <input value={from} onChange={e=>setFrom(e.target.value)} placeholder={type==="kaeri"?"出発地（空車の現在地）":"出発地（例：博多駅）"} style={inp}/>
          </div>
          <div style={{width:1.5,height:14,background:C.b3,marginLeft:4,marginBottom:12}}/>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:10,height:10,borderRadius:2,background:C.red,flexShrink:0,boxShadow:`0 0 6px ${C.red}`}}/>
            <input value={to} onChange={e=>setTo(e.target.value)} placeholder={type==="kaeri"?"目的地（どこまで行けるか）":"目的地（例：天神、大橋）"} style={inp}/>
          </div>
        </div>


        {/* 料金自動表示エリア */}
        {type==="request"&&(
          <div style={{marginBottom:14}}>
            {calcStatus==="loading"&&(
              <div style={{padding:"12px 14px",background:C.s2,borderRadius:"0 0 14px 14px",border:`1px solid ${C.b2}`,borderTop:"none",display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.t2}}>
                <span style={{display:"inline-block",animation:"spin .7s linear infinite",fontSize:14}}>⟳</span>
                距離を計算して料金を算出中...
              </div>
            )}
            {calcStatus==="done"&&fareResult&&(
              <div style={{background:"linear-gradient(135deg,rgba(255,107,0,.1),rgba(255,61,0,.06))",borderRadius:"0 0 16px 16px",border:`1px solid ${C.accent}44`,borderTop:"none",overflow:"hidden"}}>
                {/* メイン料金 */}
                <div style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:C.t2,marginBottom:3}}>距離 {fareResult.km.toFixed(1)}km · 自動計算料金</div>
                    <div style={{fontSize:30,fontWeight:900,color:C.accent,lineHeight:1}}>{fmtYen(fareResult.fare)}</div>
                    <div style={{fontSize:11,color:C.t2,marginTop:3}}>
                      範囲: {fmtYen(fareResult.min)} 〜 {fmtYen(fareResult.max)}
                      {fareResult.isLate&&<span style={{color:"#AA00FF",fontWeight:700,marginLeft:6}}>🌙 深夜+30%</span>}
                    </div>
                  </div>
                  <div style={{width:48,height:48,borderRadius:14,background:C.aL,border:`1px solid ${C.accent}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>✅</div>
                </div>
                {/* 内訳 */}
                <div style={{padding:"10px 16px",background:"rgba(0,0,0,.2)",borderTop:`1px solid ${C.accent}22`,fontSize:11,color:C.t2,display:"flex",gap:16}}>
                  <span>基本料金: {fmtYen(fareResult.tier.base)}</span>
                  <span>距離加算: {fmtYen(Math.round(Math.max(0,fareResult.km-1)*fareResult.tier.perKm))}</span>
                  {fareResult.isLate&&<span style={{color:"#AA00FF"}}>深夜割増: ×1.3</span>}
                </div>
              </div>
            )}
            {calcStatus==="error"&&(
              <div style={{padding:"10px 14px",background:C.rL,borderRadius:"0 0 12px 12px",border:`1px solid ${C.red}33`,borderTop:"none",fontSize:12,color:C.red}}>
                ⚠️ 場所を確認できませんでした。正式な地名で入力してください
              </div>
            )}
            {/* 料金表トグル */}
            <button onClick={()=>setShowTable(v=>!v)} style={{width:"100%",padding:"8px 0",background:"none",border:"none",color:C.t2,fontSize:11,cursor:"pointer",fontFamily:"inherit",marginTop:8,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
              {showTable?"▲ 料金表を閉じる":"▼ 距離別の料金表を見る"}
            </button>
            {showTable&&<FareTable/>}
          </div>
        )}


        <div style={{marginBottom:18}}>
          <div style={{fontSize:12,color:C.t2,marginBottom:6,fontWeight:700}}>メモ（任意）</div>
          <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder={type==="kaeri"?"乗車可能人数・メッセージなど":"駐車場所・その他の要望など"} style={{width:"100%",background:C.s2,border:`1px solid ${C.b2}`,borderRadius:12,padding:"12px 14px",color:C.text,fontSize:14,outline:"none",fontFamily:"inherit",minHeight:64,resize:"none",lineHeight:1.6,boxSizing:"border-box"}}/>
        </div>


        {err&&<div style={{color:C.red,fontSize:12,marginBottom:10,textAlign:"center",fontWeight:600}}>{err}</div>}


        <button onClick={submit}
          style={{width:"100%",padding:"16px 0",background:type==="request"&&fareResult?"linear-gradient(135deg,#FF6B00,#FF3D00)":type==="request"&&!fareResult?"#2a2a2a":"linear-gradient(135deg,#2979FF,#1565C0)",color:type==="request"&&fareResult?"#000":type==="request"?"#555":"#fff",border:"none",borderRadius:16,fontWeight:900,fontSize:16,cursor:"pointer",fontFamily:"inherit",transition:"all .3s"}}>
          {type==="kaeri"?"🔄 帰り便を募集する":fareResult?`🚗 ${fmtYen(fareResult.fare)}で依頼を投稿`:calcStatus==="loading"?"料金計算中...":"出発地と目的地を入力してください"}
        </button>
      </div>
    </div>
  );
}
