    try { if (window.storage) { await window.storage.set(k, JSON.stringify(v)); return; } } catch {}
    try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
  },
  async get(k) {
    try { if (window.storage) { const r = await window.storage.get(k); return r ? JSON.parse(r.value) : null; } } catch {}
    try { const s = localStorage.getItem(k); return s ? JSON.parse(s) : null; } catch { return null; }
  },
};

// ══ 料金計算 ══
const FARE_TABLE = [{maxKm:2,base:1500,perKm:400},{maxKm:5,base:2200,perKm:350},{maxKm:10,base:3400,perKm:300},{maxKm:20,base:5400,perKm:250},{maxKm:999,base:8000,perKm:200}];
const calcFare = km => {
  if(!km||km<=0) return null;
  const h = new Date().getHours(), isLate = h>=23||h<5;
  const tier = FARE_TABLE.find(t=>km<=t.maxKm)||FARE_TABLE[4];
  const fare = Math.ceil((tier.base + Math.max(0,km-1)*tier.perKm)*(isLate?1.3:1)/100)*100;
  return { fare, isLate, km, tier, min:Math.round(fare*.9), max:Math.round(fare*1.1) };
};
const calcFee = fare => { if(!fare) return null; const fee=Math.ceil(fare*.1/10)*10; return {fare,fee,net:fare-fee}; };

// ══ 距離計算（固定スポット） ══
const SPOTS = {
  "博多駅":{lat:33.5904,lon:130.4207},"天神":{lat:33.5902,lon:130.3976},
  "福岡空港":{lat:33.5839,lon:130.4511},"中洲":{lat:33.5920,lon:130.4065},
  "大橋":{lat:33.5620,lon:130.4213},"春日市":{lat:33.5317,lon:130.4747},
  "香椎":{lat:33.6275,lon:130.4373},"久留米駅":{lat:33.3196,lon:130.5083},
  "太宰府":{lat:33.5126,lon:130.5302},"姪浜":{lat:33.5815,lon:130.3444},
};
const getKm = (from,to) => {
  const f = Object.entries(SPOTS).find(([k])=>from.includes(k));
  const t = Object.entries(SPOTS).find(([k])=>to.includes(k));
  if(!f||!t) return null;
  const R=6371, dL=(t[1].lat-f[1].lat)*Math.PI/180, dO=(t[1].lon-f[1].lon)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(f[1].lat*Math.PI/180)*Math.cos(t[1].lat*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};

// 本番移行: AUTH_PROVIDER を SupabaseAuthProvider / FirebaseAuthProvider に差し替えるだけ
// 実装メソッド: sendOtp / verifyOtp / signInSocial / signOut / restoreSession
const AUTH_PROVIDER = {
  _CODE: "123456",
  async sendOtp() { await new Promise(r=>setTimeout(r,900)); return {error:null}; },
  async verifyOtp(phone, code) {
    await new Promise(r=>setTimeout(r,700));
    if(code !== this._CODE) return {user:null, error:"コードが違います（デモ: 123456）"};
    return {user:{id:"u_"+Date.now(), name:"みるちゃん", phone, verified:true, method:"phone"}, error:null};
  },
  async signInSocial(type) {
    await new Promise(r=>setTimeout(r,900));
    return {user:{id:"s_"+Date.now(), name:"みるちゃん", phone:"", verified:true, method:type}, error:null};
  },
  async signOut() { await KV.set("daiko:user", null); },
  async restoreSession() { return {user: await KV.get("daiko:user")}; },
};

// ══ ログイン画面 ══
function LoginScreen({onLogin}) {
  const [step, setStep] = useState("select");
  const [phone, setPhone] = useState("");
  const [digits, setDigits] = useState(["","","","","",""]);
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);
  const [resend, setResend] = useState(0);
  const [sl, setSl] = useState(null);
  const refs = useRef([]);

  useEffect(() => {
    if(resend <= 0) return;
    const t = setInterval(() => setResend(v => v-1), 1000);
    return () => clearInterval(t);
  }, [resend]);

  const code = digits.join("");
  const pFmt = phone.replace(/(\d{3})(\d{4})(\d{4})/, "$1-$2-$3");

  const doSocial = async type => {
    setSl(type); setErr("");
    const {user, error} = await AUTH_PROVIDER.signInSocial(type);
    setSl(null);
    if(error) { setErr(error); return; }
    await KV.set("daiko:user", user);
    setStep("ok");
    setTimeout(() => onLogin(user), 800);
  };

  const doSend = async () => {
    if(phone.length < 10) { setErr("正しい番号を入力してください"); return; }
    setLoading(true); setErr("");
    const {error} = await AUTH_PROVIDER.sendOtp(phone);
    setLoading(false);
    if(error) { setErr(error); return; }
    setStep("code"); setResend(60);
  };

  const doVerify = async () => {
    if(code.length < 6) { setErr("6桁入力してください"); return; }
    setStep("verifying"); setErr("");
    const {user, error} = await AUTH_PROVIDER.verifyOtp(phone, code);
    if(error) { setStep("code"); setErr(error); setDigits(["","","","","",""]); return; }
    await KV.set("daiko:user", user);
    setStep("ok");
    setTimeout(() => onLogin(user), 800);
  };

  const onDig = (i, val) => {
    const v = val.replace(/\D/g,"").slice(-1);
    const n = [...digits]; n[i] = v; setDigits(n);
    if(v && i < 5) refs.current[i+1]?.focus();
  };
  const onKey = (i, e) => {
    if(e.key === "Backspace" && !digits[i] && i > 0) {
      const n = [...digits]; n[i-1] = ""; setDigits(n);
      refs.current[i-1]?.focus();
    }
  };

  return (

      <div style={{flex:1, padding:"24px 20px"}}>

        {step === "select" && <>

              {type:"apple", icon:"🍎", label:"Appleでサインイン", bg:"#fff", col:"#000"},
              {type:"google", label:"Googleでサインイン", bg:"#fff", col:"#000"},
              {type:"line", icon:"💬", label:"LINEでサインイン", bg:"#06C755", col:"#fff"},
            ].map(({type, icon, label, bg, col}) => (
              <button key={type} onClick={() => doSocial(type)} disabled={sl !== null}

          </div>
          <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:20}}>
            <div style={{flex:1, height:1, background:C.b2}}/><span style={{fontSize:12, color:C.t3}}>または</span><div style={{flex:1, height:1, background:C.b2}}/>
          </div>
          <button onClick={() => setStep("phone")} style={{width:"100%", padding:"13px 0", background:C.s2, color:C.text, border:`1px solid ${C.b2}`, borderRadius:14, fontWeight:700, fontSize:15, cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8}}>
            📱 電話番号でログイン
          </button>
          <div style={{marginTop:24, background:C.s2, borderRadius:16, padding:16, border:`1px solid ${C.b2}`}}>
            <div style={{fontSize:12, fontWeight:700, color:C.t2, marginBottom:12}}>代行なうの安心ポイント</div>
            {[
              {i:"🔍",t:"全ドライバー本人確認済み",d:"免許証・身分証を事前審査"},
              {i:"📞",t:"24時間サポート対応",d:"緊急時も即座にサポート"},
              {i:"💳",t:"後払い安心決済",d:"乗車後に支払い確定"},
              {i:"⭐",t:"リアル評価システム",d:"利用ごとに評価・レビュー"},
            ].map(({i,t,d}) => (
              <div key={t} style={{display:"flex", gap:12, alignItems:"flex-start", marginBottom:12}}>
                <div style={{width:36, height:36, borderRadius:10, background:C.aL, border:`1px solid ${C.accent}22`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0}}>{i}</div>

              </div>
            ))}
          </div>
        </>}

        {step === "phone" && <>
          <button onClick={() => { setStep("select"); setErr(""); setPhone(""); }} style={{background:"none", border:"none", color:C.t2, fontSize:13, cursor:"pointer", fontFamily:"inherit", marginBottom:16, display:"flex", alignItems:"center", gap:4, padding:0}}>← 戻る</button>

            <div style={{fontSize:12, color:C.t2}}>SMS認証コードを送信します</div>
          </div>
          <div style={{background:C.s2, borderRadius:14, padding:"4px 4px 4px 14px", display:"flex", alignItems:"center", gap:8, border:`1px solid ${err?C.red:phone.length>=10?C.green:C.b2}`, marginBottom:8}}>
            <span style={{fontSize:14, color:C.t2, whiteSpace:"nowrap", fontWeight:600}}>🇯🇵 +81</span>
            <input value={phone} onChange={e => { setPhone(e.target.value.replace(/\D/g,"").slice(0,11)); setErr(""); }}
              placeholder="09012345678" inputMode="numeric"
              style={{flex:1, background:"transparent", border:"none", color:C.text, fontSize:18, outline:"none", fontFamily:"inherit", padding:"12px 0"}}/>
            {phone.length >= 10 && <span style={{color:C.green, fontSize:16, paddingRight:8}}>✓</span>}
          </div>
          {phone.length >= 10 && <div style={{fontSize:11, color:C.t2, marginBottom:12}}>{pFmt}</div>}
          {err && <div style={{fontSize:12, color:C.red, marginBottom:10}}>⚠️ {err}</div>}
          <button onClick={doSend} disabled={phone.length < 10 || loading}
            style={{width:"100%", padding:"15px 0", background:phone.length>=10&&!loading?"linear-gradient(135deg,#FF6B00,#FF3D00)":"#2a2a2a", color:phone.length>=10&&!loading?"#000":"#555", border:"none", borderRadius:14, fontWeight:900, fontSize:16, cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8}}>
            {loading ? <><span style={{display:"inline-block", animation:"spin .6s linear infinite"}}>⟳</span><span>送信中...</span></> : "SMSを送信する →"}
          </button>
        </>}

        {(step === "code" || step === "verifying") && <>
          <button onClick={() => { setStep("phone"); setErr(""); setDigits(["","","","","",""]); }} style={{background:"none", border:"none", color:C.t2, fontSize:13, cursor:"pointer", fontFamily:"inherit", marginBottom:16, display:"flex", alignItems:"center", gap:4, padding:0}}>← 番号を変更</button>
          <div style={{marginBottom:24}}>
            <div style={{fontSize:18, fontWeight:900, marginBottom:4}}>認証コードを入力</div>
            <div style={{fontSize:13, color:C.t2}}><span style={{color:C.accent, fontWeight:700}}>{pFmt||phone}</span> に送信した6桁を入力</div>
          </div>
          <div style={{display:"flex", gap:8, justifyContent:"center", marginBottom:12}}>
            {digits.map((d, i) => (
              <div key={i} style={{flex:1, maxWidth:44}}>
                <input ref={el => refs.current[i] = el} value={d}
                  onChange={e => onDig(i, e.target.value)} onKeyDown={e => onKey(i, e)}
                  inputMode="numeric" maxLength={1}
                  style={{width:"100%", height:54, borderRadius:12, background:d?C.aL:C.s2, border:`2px solid ${d?C.accent:C.b2}`, color:C.text, fontSize:24, fontWeight:900, textAlign:"center", outline:"none", fontFamily:"monospace", boxSizing:"border-box"}}/>
              </div>
            ))}
          </div>
          <div style={{height:3, background:C.b2, borderRadius:2, marginBottom:12, overflow:"hidden"}}>
            <div style={{height:"100%", background:"linear-gradient(90deg,#FF6B00,#FFD700)", width:`${code.length/6*100}%`, transition:"width .1s", borderRadius:2}}/>
          </div>
          {err && <div style={{background:C.rL, border:`1px solid ${C.red}33`, borderRadius:10, padding:"10px 14px", fontSize:12, color:C.red, marginBottom:12}}>⚠️ {err}</div>}
          <div style={{background:"rgba(74,144,255,.07)", border:`1px solid ${C.blue}22`, borderRadius:10, padding:"8px 12px", marginBottom:12, fontSize:11, color:C.blue}}>
            🔧 デモ: <b style={{letterSpacing:2}}>123456</b> を入力
          </div>
          <button onClick={doVerify} disabled={code.length < 6 || step === "verifying"}
            style={{width:"100%", padding:"15px 0", background:code.length>=6&&step!=="verifying"?"linear-gradient(135deg,#FF6B00,#FF3D00)":"#2a2a2a", color:code.length>=6&&step!=="verifying"?"#000":"#555", border:"none", borderRadius:14, fontWeight:900, fontSize:16, cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", justifyContent:"center", gap:8, marginBottom:12}}>
            {step === "verifying" ? <><span style={{display:"inline-block", animation:"spin .6s linear infinite"}}>⟳</span><span>確認中...</span></> : "確認してログイン ✓"}
          </button>
          <div style={{textAlign:"center"}}>
            {resend > 0 ? <span style={{fontSize:12, color:C.t3}}>{resend}秒後に再送できます</span>
              : <button onClick={doSend} style={{background:"none", border:"none", color:C.blue, fontSize:13, cursor:"pointer", fontFamily:"inherit", fontWeight:600}}>コードを再送する</button>}
          </div>
        </>}

        <div style={{marginTop:20, fontSize:10, color:C.t3, textAlign:"center", lineHeight:1.8}}>
          <span style={{color:C.t2}}>利用規約</span>・<span style={{color:C.t2}}>プライバシーポリシー</span>に同意してサインイン
        </div>
      </div>
    </div>
  );
}

// ══ 設定画面 ══
function SettingsScreen({user, onLogout, onUpdateUser}) {
  const [sub, setSub] = useState(null);
  const [notif, setNotif] = useState({newReq:true, matched:true, chat:true, promo:false});
  const [profile, setProfile] = useState({name:user?.name||"みるちゃん", phone:user?.phone||"090-0000-0000", email:"", rating:4.9, useCount:38, since:"2024年3月"});
  const [ep, setEp] = useState(null);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [places, setPlaces] = useState(SAVED_PLACES_DEFAULT);
  const [editPlace, setEditPlace] = useState(null);
  const [pf, setPf] = useState({label:"", address:"", icon:"📍", color:C.accent});
  const favs = DRIVERS.filter(d => d.rating >= 4.8);

  const saveProfile = async () => {
    setSaving(true);
    await new Promise(r => setTimeout(r, 700));
    setProfile(ep);
    onUpdateUser && onUpdateUser(ep);
    await KV.set("daiko:user", {...user, ...ep});
    setSaving(false); setSaved(true);
    setTimeout(() => { setSaved(false); setSub(null); }, 900);
  };

  const savePlace = () => {
    if(!pf.address.trim()) return;
    if(editPlace === "new") setPlaces(p => [...p, {id:"p"+Date.now(), ...pf}]);
    else setPlaces(p => p.map(x => x.id === editPlace.id ? {...x, ...pf} : x));
    setEditPlace(null);
  };

  const Inp = ({field, ph, type="text"}) => (
    <input value={(ep||{})[field]||""} onChange={e => setEp(p => ({...p, [field]:e.target.value}))}
      type={type} placeholder={ph}
      style={{width:"100%", background:C.s2, border:`1px solid ${C.b2}`, borderRadius:12, padding:"13px 14px", color:C.text, fontSize:15, outline:"none", fontFamily:"inherit", boxSizing:"border-box"}}
      onFocus={e => e.target.style.borderColor = C.accent}
      onBlur={e => e.target.style.borderColor = C.b2}/>
  );

  // プロフィール編集
  if(sub === "profile" && ep) return (
    <div style={{display:"flex", flexDirection:"column", height:"100%", overflowY:"auto"}}>
      <SubHdr title="プロフィール編集" onBack={() => setSub(null)} right={
        <button onClick={saveProfile} disabled={saving}
          style={{padding:"7px 16px", background:saved?"linear-gradient(135deg,#00D26A,#00a050)":saving?"#2a2a2a":"linear-gradient(135deg,#FF6B00,#FF3D00)", color:saved||saving?"#555":"#000", border:"none", borderRadius:10, fontWeight:800, fontSize:13, cursor:"pointer", fontFamily:"inherit", display:"flex", alignItems:"center", gap:5}}>
          {saved ? "✓ 保存済" : saving ? <><span style={{display:"inline-block", animation:"spin .6s linear infinite"}}>⟳</span> 保存中</> : "保存"}
        </button>}/>
      <div style={{padding:16, paddingBottom:32}}>
        <div style={{textAlign:"center", marginBottom:24}}>
          <div style={{position:"relative", display:"inline-block"}}>
            <div style={{width:88, height:88, borderRadius:"50%", background:`linear-gradient(${avC(ep.name||"?")})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:36, fontWeight:900, color:"#fff", border:`3px solid ${C.accent}`, boxShadow:`0 0 20px rgba(255,107,0,.3)`}}>{avCh(ep.name||"?")}</div>
            <div style={{position:"absolute", bottom:0, right:0, width:28, height:28, borderRadius:"50%", background:"linear-gradient(135deg,#FF6B00,#FF3D00)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, border:`2px solid ${C.bg}`}}>📷</div>
          </div>
          <div style={{fontSize:11, color:C.t2, marginTop:8}}>タップして変更（将来実装予定）</div>
        </div>
        {[{l:"ニックネーム",f:"name",ph:"表示名",i:"👤"},{l:"電話番号",f:"phone",ph:"090-0000-0000",i:"📱",t:"tel"},{l:"メールアドレス",f:"email",ph:"example@mail.com",i:"📧",t:"email"}].map(({l,f,ph,i,t}) => (
          <div key={f} style={{marginBottom:16}}>
            <div style={{fontSize:12, color:C.t2, fontWeight:700, marginBottom:6, display:"flex", alignItems:"center", gap:5}}><span>{i}</span>{l}</div>
            <Inp field={f} ph={ph} type={t||"text"}/>
          </div>
        ))}
        <div style={{background:C.s2, borderRadius:14, padding:"12px 14px", border:`1px solid ${C.b2}`, marginBottom:16}}>

              <span style={{flex:1, fontSize:13, color:done?C.text:C.t2}}>{l}</span>

              <div key={l} style={{flex:1, textAlign:"center", background:`${c}0d`, borderRadius:10, padding:"8px 4px", border:`1px solid ${c}22`}}>
                <div style={{fontSize:13, fontWeight:900, color:c}}>{v}</div>
                <div style={{fontSize:9, color:C.t2, marginTop:2}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  // よく使う住所
  if(sub === "places") {
    if(editPlace !== null) return (
      <div style={{display:"flex", flexDirection:"column", height:"100%", overflowY:"auto"}}>
        <SubHdr title={editPlace==="new"?"住所を追加":"住所を編集"} onBack={() => setEditPlace(null)}/>
        <div style={{padding:16}}>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12, color:C.t2, fontWeight:700, marginBottom:8}}>アイコン</div>
            <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
              {PLACE_ICONS.map(ic => (
                <button key={ic} onClick={() => setPf(p => ({...p, icon:ic}))}
                  style={{width:42, height:42, borderRadius:12, fontSize:20, border:`2px solid ${pf.icon===ic?C.accent:C.b2}`, background:pf.icon===ic?C.aL:C.s2, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>{ic}</button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12, color:C.t2, fontWeight:700, marginBottom:8}}>カラー</div>
            <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
              {PLACE_COLORS.map(col => (

          {[{l:"ラベル",f:"label",ph:"自宅・会社など"},{l:"住所",f:"address",ph:"例：福岡市中央区天神2-1-1"}].map(({l,f,ph}) => (
            <div key={f} style={{marginBottom:14}}>
              <div style={{fontSize:12, color:C.t2, fontWeight:700, marginBottom:6}}>{l}</div>
              <input value={pf[f]} onChange={e => setPf(p => ({...p, [f]:e.target.value}))} placeholder={ph}
                style={{width:"100%", background:C.s2, border:`1px solid ${C.b2}`, borderRadius:12, padding:"13px 14px", color:C.text, fontSize:15, outline:"none", fontFamily:"inherit", boxSizing:"border-box"}}
                onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.b2}/>
            </div>
          ))}
          {pf.address && (
            <div style={{background:C.s2, borderRadius:12, padding:"12px 14px", border:`1px solid ${pf.color}33`, marginBottom:14, display:"flex", gap:12, alignItems:"center"}}>
              <div style={{width:40, height:40, borderRadius:12, background:`${pf.color}18`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20}}>{pf.icon}</div>
              <div><div style={{fontWeight:700, fontSize:14, color:pf.color}}>{pf.label||"ラベル未設定"}</div><div style={{fontSize:12, color:C.t2, marginTop:2}}>{pf.address}</div></div>

            style={{padding:"7px 14px", background:"linear-gradient(135deg,#FF6B00,#FF3D00)", color:"#000", border:"none", borderRadius:10, fontWeight:800, fontSize:13, cursor:"pointer", fontFamily:"inherit"}}>＋ 追加</button>}/>

// ══ ネオンCanvasマップ ══
function NeonMap({fromSpot, toSpot}) {
  const cvRef = useRef(null);
  const [tick, setTick] = useState(0);
  const dPos = useRef(DRIVERS.filter(d=>d.active).map((d,i)=>({...d, px:0.15+i*0.18, py:0.2+i*0.14})));
  const pulse = useRef(0);

  useEffect(() => {
    const t = setInterval(() => {
      pulse.current = (pulse.current + 1) % 30;
      dPos.current = dPos.current.map(d => ({...d, px:Math.max(0.06,Math.min(0.90,d.px+(Math.random()-.5)*.018)), py:Math.max(0.06,Math.min(0.88,d.py+(Math.random()-.5)*.018))}));
      setTick(v=>v+1);
    }, 1800);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    const cv = cvRef.current; if(!cv) return;
    const ctx = cv.getContext("2d");
    const W = cv.width, H = cv.height;

    // 黒背景
    ctx.fillStyle = "#050508"; ctx.fillRect(0,0,W,H);

    // ネオングリッド
    ctx.strokeStyle = "rgba(255,107,0,.07)"; ctx.lineWidth = 0.5;
    for(let x=0;x<W;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // 主要道路（オレンジネオン）
    const roads = [[0,H*.5,W,H*.5],[W*.5,0,W*.5,H],[W*.18,0,W*.18,H],[W*.82,0,W*.82,H],[0,H*.28,W,H*.28],[0,H*.72,W,H*.72]];
    roads.forEach(([x1,y1,x2,y2],i) => {
      // 発光エフェクト
      ctx.shadowColor = "rgba(255,107,0,.4)"; ctx.shadowBlur = 6;
      ctx.strokeStyle = i<2?"rgba(255,107,0,.35)":"rgba(255,107,0,.18)";
      ctx.lineWidth = i<2?3:1.5;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.shadowBlur = 0;
    });

    // 地名ラベル
    const areas = [["博多駅",W*.18,H*.5],["天神",W*.5,H*.28],["中洲",W*.5,H*.5],["大橋",W*.5,H*.72],["香椎",W*.82,H*.28],["春日市",W*.82,H*.72]];
    ctx.shadowBlur = 0;
    areas.forEach(([name,x,y]) => {
      ctx.fillStyle = "rgba(255,255,255,.2)";
      ctx.font = "9px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(name, x, y+16);
    });

    // 出発地・目的地ライン
    if(fromSpot && toSpot) {
      const fx = fromSpot.px*W, fy = fromSpot.py*H;
      const tx = toSpot.px*W, ty = toSpot.py*H;
      ctx.shadowColor = C.green; ctx.shadowBlur = 10;
      ctx.strokeStyle = C.green; ctx.lineWidth = 2;
      ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur = 0;
      // 出発
      ctx.shadowColor = C.green; ctx.shadowBlur = 12;
      ctx.fillStyle = C.green; ctx.beginPath(); ctx.arc(fx,fy,7,0,Math.PI*2); ctx.fill();
      // 目的地
      ctx.fillStyle = C.red; ctx.shadowColor = C.red; ctx.beginPath(); ctx.arc(tx,ty,7,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // 現在地（中央）
    const p = pulse.current / 30;
    const pr = 6 + p*8;
    ctx.strokeStyle = `rgba(74,144,255,${0.6-p*.5})`; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(W/2,H/2,pr,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle = C.blue; ctx.shadowColor = C.blue; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(W/2,H/2,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.shadowBlur = 0;
    ctx.font = "bold 9px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("現在地", W/2, H/2+16);

    // ドライバーアイコン
    dPos.current.forEach(d => {
      const x = d.px * W, y = d.py * H;
      // 波紋
      ctx.strokeStyle = "rgba(255,107,0,.3)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x,y,16,0,Math.PI*2); ctx.stroke();
      // アイコン本体
      ctx.fillStyle = C.accent; ctx.shadowColor = C.accent; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#000"; ctx.shadowBlur = 0;
      ctx.font = "bold 8px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(d.short[0], x, y);
      // ETAラベル
      const lw = 50, lh = 17;
      ctx.fillStyle = "rgba(20,20,20,.92)";
      ctx.strokeStyle = C.accent; ctx.lineWidth = 1;
      ctx.shadowColor = C.accent; ctx.shadowBlur = 4;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(x-lw/2, y-32, lw, lh, 4);
      else { ctx.moveTo(x-lw/2+4,y-32); ctx.lineTo(x+lw/2-4,y-32); ctx.lineTo(x+lw/2,y-28); ctx.lineTo(x+lw/2,y-32+lh); ctx.lineTo(x-lw/2,y-32+lh); ctx.lineTo(x-lw/2,y-28); ctx.closePath(); }
      ctx.fill(); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = C.accent; ctx.font = "bold 8px sans-serif";
      ctx.fillText(`${d.eta}分`, x-7, y-23);
      ctx.fillStyle = C.gold;
      ctx.fillText(`${fmtYen(d.price)}`, x+8, y-23);
    });
  }, [tick, fromSpot, toSpot]);

  return (
    <div style={{width:"100%", borderRadius:16, overflow:"hidden", border:`1px solid rgba(255,107,0,.25)`, background:"#050508", position:"relative"}}>
      <canvas ref={cvRef} width={360} height={260} style={{width:"100%", height:260, display:"block"}}/>
      {/* 凡例 */}
      <div style={{position:"absolute", bottom:0, left:0, right:0, padding:"6px 10px", background:"rgba(5,5,8,.85)", display:"flex", gap:10, fontSize:10}}>
        <span style={{color:C.blue}}>● 現在地</span>
        <span style={{color:C.accent}}>● ドライバー</span>
        {fromSpot && <span style={{color:C.green}}>● 出発</span>}
        {toSpot && <span style={{color:C.red}}>● 目的地</span>}
        <span style={{marginLeft:"auto", color:C.green}}>{dPos.current.length}台稼働 · 2s更新</span>
      </div>
    </div>
  );
}

    const m = setTimeout(() => setPhase("matched"), 2300);
    return () => { clearInterval(s); clearTimeout(m); };
  }, []);

  useEffect(() => {
    if(phase !== "matched") return;
    const t = setInterval(() => setCd(c => Math.max(0,c-1)), 1000);
    return () => clearInterval(t);
  }, [phase]);

  const mm = String(Math.floor(cd/60)).padStart(2,"0");

  return (
    <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,.93)", zIndex:900, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px 16px", fontFamily:"'Noto Sans JP',sans-serif"}}>

          <div style={{width:"100%", height:3, background:C.b2, borderRadius:2, overflow:"hidden", marginBottom:28}}>
            <div style={{height:"100%", background:"linear-gradient(90deg,#FF6B00,#FF3D00)", width:`${pct}%`, transition:"width .08s linear", borderRadius:2}}/>
          </div>
          <button onClick={onCancel} style={{padding:"12px 32px", background:"none", border:`1px solid ${C.b3}`, borderRadius:24, color:C.t2, fontSize:14, cursor:"pointer", fontFamily:"inherit"}}>キャンセル</button>
        </div>
      ) : (
        <div style={{width:"100%", maxWidth:340, animation:"scaleIn .4s cubic-bezier(.34,1.56,.64,1)"}}>
          <div style={{textAlign:"center", marginBottom:16}}>
            <div style={{fontSize:12, color:C.green, fontWeight:800, letterSpacing:1.5, marginBottom:6, display:"flex", alignItems:"center", justifyContent:"center", gap:5}}>
              <span style={{width:7, height:7, borderRadius:"50%", background:C.green, display:"inline-block", animation:"blink 1s ease-in-out infinite"}}/>
              マッチング完了
            </div>
            <div style={{fontSize:22, fontWeight:900, color:C.text}}>ドライバーが向かっています</div>
          </div>
          <div style={{background:C.card, borderRadius:20, padding:20, marginBottom:14, border:`1px solid ${C.b2}`}}>
            <div style={{display:"flex", gap:14, alignItems:"center", marginBottom:16}}>
              <Av name={driver.name} size={56} ring status={true}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:800, fontSize:18, marginBottom:3}}>{driver.name}</div>
                <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:6}}>

                </div>
                <div style={{display:"flex", gap:4, flexWrap:"wrap"}}>{driver.tags.map(t => <Tag key={t} label={t}/>)}</div>
              </div>

                <div style={{fontSize:26, fontWeight:900, color:C.accent}}>{mm}:{ss}</div>
                <div style={{fontSize:11, color:C.t2, marginTop:2}}>到着まで</div>
              </div>
              <div style={{flex:1, background:C.gL, borderRadius:12, padding:"12px 0", textAlign:"center", border:`1px solid ${C.green}22`}}>

  );

// ══ 提案モーダル ══
function ProposalModal({post, onSelect, onClose}) {
  const [selected, setSelected] = useState(null);
  const [confirming, setConfirming] = useState(false);

  const proposals = useMemo(() => {
    const base = post.price || 2000;
    return DRIVERS.filter(d => d.active).map((d, i) => {
      const spread = [0,-200,200,-100][i] || 0;
      const fare = Math.ceil((base+spread)/100)*100;
      const f = calcFee(fare);
      return {id:"pr_"+d.id, driver:d, fare, fee:f?.fee||0, net:f?.net||fare, eta:d.eta+rnd(-1,2), dist:d.dist, recommended:i===0};
    }).sort((a,b) => a.eta-b.eta);
  }, [post]);

  const confirm = async () => {
    if(!selected) return;
    setConfirming(true);
    await new Promise(r => setTimeout(r, 900));
    onSelect(selected);
  };

  return (
    <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,.92)", zIndex:400, display:"flex", flexDirection:"column", justifyContent:"flex-end", fontFamily:"'Noto Sans JP',sans-serif"}}>
      <div style={{background:C.s1, borderRadius:"20px 20px 0 0", maxHeight:"88vh", display:"flex", flexDirection:"column", border:`1px solid ${C.b2}`, borderBottom:"none"}}>
        <div style={{flexShrink:0, padding:"16px 16px 12px", borderBottom:`1px solid ${C.border}`}}>
          <div style={{width:36, height:3, borderRadius:2, background:C.b3, margin:"0 auto 14px"}}/>
          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
            <div>
              <div style={{fontWeight:900, fontSize:17}}>代行会社からの提案</div>
              <div style={{fontSize:12, color:C.t2, marginTop:2}}>{post.from} → {post.to} · {proposals.length}社が応答</div>
            </div>
            <button onClick={onClose} style={{background:"none", border:"none", color:C.t2, fontSize:22, cursor:"pointer", lineHeight:1}}>×</button>
          </div>
        </div>
        <div style={{flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"12px 16px"}}>
          {proposals.map((p, i) => {
            const isSel = selected?.id === p.id;
            return (
              <div key={p.id} onClick={() => setSelected(p)}
                style={{background:isSel?"linear-gradient(135deg,rgba(255,107,0,.12),rgba(255,61,0,.06))":C.card, borderRadius:16, padding:14, marginBottom:10, border:`2px solid ${isSel?C.accent:C.b2}`, cursor:"pointer", position:"relative", animation:`slideUp .3s ease ${i*.08}s both`}}>
                {p.recommended && <div style={{position:"absolute", top:-1, right:12, background:"linear-gradient(135deg,#FF6B00,#FF3D00)", color:"#000", fontSize:9, fontWeight:900, padding:"3px 10px", borderRadius:"0 0 8px 8px"}}>⚡ おすすめ</div>}
                <div style={{display:"flex", gap:12, alignItems:"center", marginBottom:12}}>
                  <Av name={p.driver.name} size={46} status={p.driver.active}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800, fontSize:14, marginBottom:2}}>{p.driver.name}</div>
                    <div style={{display:"flex", alignItems:"center", gap:5, marginBottom:4}}><Stars rating={p.driver.rating} size={10}/><span style={{color:C.gold, fontSize:11, fontWeight:700}}>{p.driver.rating}</span><span style={{color:C.t2, fontSize:10}}>({p.driver.reviews})</span></div>
                    <div style={{display:"flex", gap:4, flexWrap:"wrap"}}>{p.driver.tags.slice(0,2).map(t => <Tag key={t} label={t}/>)}</div>
                  </div>
                  <div style={{width:26, height:26, borderRadius:"50%", border:`2px solid ${isSel?C.accent:C.b3}`, background:isSel?"linear-gradient(135deg,#FF6B00,#FF3D00)":"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0}}>
                    {isSel && <span style={{fontSize:13, color:"#000"}}>✓</span>}
                  </div>
                </div>
                <div style={{display:"flex", gap:6}}>
                  {[{i:"⏱",l:"到着",v:`${p.eta}分`,c:C.accent},{i:"📍",l:"距離",v:`${p.dist}km`,c:C.blue},{i:"💴",l:"料金",v:fmtYen(p.fare),c:C.gold}].map(({i,l,v,c}) => (
                    <div key={l} style={{flex:1, background:`${c}0d`, borderRadius:9, padding:"7px 4px", textAlign:"center", border:`1px solid ${c}22`}}>
                      <div style={{fontSize:10, marginBottom:1}}>{i}</div>
                      <div style={{fontSize:12, fontWeight:800, color:c}}>{v}</div>
                      <div style={{fontSize:9, color:C.t2, marginTop:1}}>{l}</div>

                  ))}
                </div>
                {isSel && <div style={{marginTop:8, paddingTop:8, borderTop:`1px solid ${C.border}`, display:"flex", gap:5, alignItems:"center", fontSize:11, flexWrap:"wrap"}}>

                  <span style={{fontWeight:700}}>{fmtYen(p.fare)}</span>
                  <span style={{color:C.t3}}>−</span>

          </button>
        </div>
      </div>
    </div>
  );
}

function MatchedScreen({proposal, post, onClose}) {
  const [phase, setPhase] = useState("pop");
  const [cd, setCd] = useState(proposal.eta*60);
  const [msgs, setMsgs] = useState([{id:1, from:proposal.driver.id, text:`${post.from}から向かっています！約${proposal.eta}分で到着予定です🚗`, time:Date.now()-8000}]);
  const [txt, setTxt] = useState("");
  const btm = useRef(null);
  const f = calcFee(proposal.fare);

  useEffect(() => { const t = setTimeout(() => setPhase("detail"), 1500); return () => clearTimeout(t); }, []);
  useEffect(() => { const t = setInterval(() => setCd(c => Math.max(0,c-1)), 1000); return () => clearInterval(t); }, []);
  useEffect(() => {
    const ts = [
      setTimeout(() => { setMsgs(m => [...m, {id:2, from:proposal.driver.id, text:"信号待ち中です、もうすぐ動きます🚦", time:Date.now()}]); }, 8000),
      setTimeout(() => { setMsgs(m => [...m, {id:3, from:proposal.driver.id, text:"あと少しで到着します！🙌", time:Date.now()}]); }, 16000),
    ];
    return () => ts.forEach(clearTimeout);
  }, []);
  useEffect(() => { btm.current?.scrollIntoView({behavior:"smooth"}); }, [msgs]);

  const send = () => {
    if(!txt.trim()) return;
    setMsgs(m => [...m, {id:Date.now(), from:"me", text:txt, time:Date.now()}]);
    setTxt("");
    setTimeout(() => setMsgs(m => [...m, {id:Date.now()+1, from:proposal.driver.id, text:"了解です！🙌", time:Date.now()}]), 1400);
  };

  const mm = String(Math.floor(cd/60)).padStart(2,"0");
  const ss = String(cd%60).padStart(2,"0");

  if(phase === "pop") return (
    <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,.96)", zIndex:800, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Noto Sans JP',sans-serif"}}>

        </div>
        <div style={{fontSize:30, fontWeight:900, color:C.green, marginBottom:8, animation:"scaleIn .6s cubic-bezier(.34,1.56,.64,1)"}}>マッチしました！</div>
        <div style={{fontSize:14, color:C.t2, marginBottom:6}}>{proposal.driver.name}さんが向かっています</div>
        <div style={{fontSize:12, color:C.accent, fontWeight:700}}>約{proposal.eta}分で到着予定</div>
      </div>
    </div>
  );

  return (
    <div style={{position:"fixed", inset:0, background:C.bg, zIndex:800, display:"flex", flexDirection:"column", fontFamily:"'Noto Sans JP',sans-serif"}}>
      <div style={{flexShrink:0, background:"linear-gradient(160deg,rgba(0,210,106,.1),#0a0a0a)", padding:"12px 14px", borderBottom:`1px solid ${C.green}22`}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
          <div style={{display:"flex", alignItems:"center", gap:6}}>
            <div style={{width:8, height:8, borderRadius:"50%", background:C.green, animation:"blink 1s ease-in-out infinite"}}/>

        </div>
        <div style={{display:"flex", gap:10, alignItems:"center", marginBottom:10}}>
          <Av name={proposal.driver.name} size={50} ring status={true}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:900, fontSize:16, marginBottom:2}}>{proposal.driver.name}</div>

          <div style={{flex:1, background:C.gL, borderRadius:11, padding:"9px 4px", textAlign:"center", border:`1px solid ${C.green}22`}}>

      <div style={{flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"10px 14px", display:"flex", flexDirection:"column", gap:8}}>

                <div style={{fontSize:10, color:C.t3, marginTop:2, textAlign:mine?"right":"left"}}>{ago(m.time)}</div>

  );
}

            <span style={{fontSize:10, padding:"2px 7px", borderRadius:8, fontWeight:700, background:C.aL, color:C.accent, border:`1px solid ${C.accent}22`}}>⚡ 今すぐ</span>
            {post.viewers > 0 && <span style={{fontSize:10, color:C.t4}}>👁 {post.viewers}人</span>}
          </div>
        </div>
      </div>
      <div style={{background:C.s2, borderRadius:14, padding:"12px 14px", marginBottom:10, border:`1px solid ${C.b2}`}}>
        <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:8}}>
          <div style={{display:"flex", flexDirection:"column", alignItems:"center"}}>
            <div style={{width:9, height:9, borderRadius:"50%", background:C.green, boxShadow:`0 0 6px ${C.green}`}}/>
            <div style={{width:1.5, height:18, background:`linear-gradient(${C.green},${C.red})`, margin:"2px 0"}}/>
            <div style={{width:9, height:9, borderRadius:2, background:C.red, boxShadow:`0 0 6px ${C.red}`}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:14, fontWeight:700, marginBottom:8}}>{post.from}</div>
            <div style={{fontSize:14, fontWeight:700, color:C.t2}}>{post.to}</div>
          </div>
          {!isKaeri && post.price > 0 && <div style={{textAlign:"right"}}>
            <div style={{fontSize:22, fontWeight:900, color:C.accent, lineHeight:1}}>{fmtYen(post.price)}</div>
            {post.km && <div style={{fontSize:10, color:C.t2, marginTop:2}}>{post.km.toFixed(1)}km</div>}
          </div>}
        </div>
        <div style={{display:"flex", gap:12, paddingTop:8, borderTop:`1px solid ${C.border}`, fontSize:11, color:C.t2}}>
          <span>📍 {post.dist}km</span>
          <span>⏱ 約{user.eta}分</span>
        </div>
      </div>
      {/* 手数料（成立時） */}
      {isClosed && post.price > 0 && f && (
        <div style={{marginBottom:10, background:"linear-gradient(135deg,rgba(0,210,106,.06),rgba(0,160,80,.03))", borderRadius:12, padding:"10px 14px", border:`1px solid ${C.green}22`}}>
          <div style={{fontSize:10, color:C.green, fontWeight:800, marginBottom:7}}>✅ 取引成立 — 手数料内訳</div>
          <div style={{display:"flex", gap:6}}>
            {[{v:fmtYen(f.fare),l:"総額",c:C.text},{v:`−${fmtYen(f.fee)}`,l:"手数料10%",c:C.red},{v:fmtYen(f.net),l:"受取額",c:C.green}].map(({v,l,c}) => (
              <div key={l} style={{flex:1, textAlign:"center", background:`${c}10`, borderRadius:8, padding:"7px 4px", border:`1px solid ${c}22`}}>
                <div style={{fontSize:13, fontWeight:800, color:c}}>{v}</div>
                <div style={{fontSize:9, color:C.t2, marginTop:1}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      {post.note && <div style={{fontSize:13, color:C.t2, lineHeight:1.6, marginBottom:10, padding:"8px 12px", background:C.s2, borderRadius:10, border:`1px solid ${C.b2}`}}>{post.note}</div>}
      <div style={{display:"flex", gap:8, alignItems:"center"}}>
        {!isOwn && !isClosed && <button onClick={doAccept} disabled={accepting}
          style={{flex:1, padding:"12px 0", border:"none", borderRadius:14, fontWeight:900, fontSize:14, cursor:accepting?"default":"pointer", fontFamily:"inherit", background:done?C.s2:accepting?"#102210":"linear-gradient(135deg,#FF6B00,#FF3D00)", color:done?C.t3:accepting?C.green:"#000", display:"flex", alignItems:"center", justifyContent:"center", gap:8}}>
          {accepting ? <><span style={{display:"inline-block", animation:"spin .6s linear infinite"}}>⟳</span><span>受付中...</span></> : done ? "✓ 受付完了" : "🔥 即受ける"}
        </button>}
        {!isOwn && !isClosed && <button onClick={() => onCallDriver && onCallDriver(user)}
          style={{padding:"12px 13px", background:C.aL, color:C.accent, border:`1px solid ${C.accent}33`, borderRadius:14, fontWeight:700, fontSize:12, cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap"}}>🚗 呼ぶ</button>}
        {isClosed && <button onClick={() => onChat(post)}
          style={{flex:1, padding:"12px 0", background:C.bL, color:C.blue, border:`1px solid ${C.blue}33`, borderRadius:14, fontWeight:700, fontSize:13, cursor:"pointer", fontFamily:"inherit"}}>💬 チャットを開く</button>}
        {isOwn && !isClosed && <div style={{flex:1, padding:"12px 0", background:C.aL, color:C.accent, border:`1px solid ${C.accent}22`, borderRadius:14, fontWeight:700, fontSize:13, textAlign:"center"}}>📢 あなたの依頼</div>}
        <button onClick={() => onLike(post.id)} style={{width:44, height:44, borderRadius:12, background:post.liked?C.rL:C.s2, color:post.liked?C.red:C.t3, border:`1px solid ${post.liked?C.red+"33":C.b2}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:3, fontSize:12, fontWeight:700, fontFamily:"inherit"}}>
          {post.liked?"❤️":"🤍"}{post.likes > 0 && <span style={{fontSize:11}}>{post.likes}</span>}
        </button>
        <button onClick={() => setReplyOpen(v => !v)} style={{width:44, height:44, borderRadius:12, background:replyOpen?C.bL:C.s2, color:replyOpen?C.blue:C.t3, border:`1px solid ${replyOpen?C.blue+"33":C.b2}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:3, fontSize:12, fontFamily:"inherit"}}>
          💬{post.replies.length > 0 && <span style={{fontSize:11}}>{post.replies.length}</span>}
        </button>
      </div>
      {replyOpen && (
        <div style={{marginTop:10, background:C.s2, borderRadius:12, padding:"10px 12px", border:`1px solid ${C.b2}`}}>
          {post.replies.map(r => {
            const ru = DRIVERS.find(u => u.id === r.userId) || {name:"?"};
            return (
              <div key={r.id} style={{display:"flex", gap:8, padding:"6px 0", borderBottom:`1px solid ${C.border}`}}>
                <Av name={ru.name} size={26}/>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700, fontSize:12, color:C.t2}}>{ru.name} <span style={{fontSize:10, marginLeft:4}}>{ago(r.time)}</span></div>
                  <div style={{fontSize:13, color:C.text, marginTop:2}}>{r.text}</div>
                </div>
              </div>
            );
          })}
          <div style={{display:"flex", gap:8, marginTop:8}}>
            <input value={replyTxt} onChange={e => setReplyTxt(e.target.value)}
              onKeyDown={e => { if(e.key==="Enter" && replyTxt.trim()) { onReply(post.id, replyTxt); setReplyTxt(""); } }}
              placeholder="コメントする..."
              style={{flex:1, background:C.bg, border:`1px solid ${C.b2}`, borderRadius:18, padding:"8px 14px", color:C.text, fontSize:13, outline:"none", fontFamily:"inherit"}}/>
            <button onClick={() => { if(replyTxt.trim()) { onReply(post.id, replyTxt); setReplyTxt(""); } }}
              style={{padding:"8px 14px", background:C.accent, color:"#000", border:"none", borderRadius:18, fontWeight:700, fontSize:12, cursor:"pointer", fontFamily:"inherit"}}>送信</button>
          </div>
        </div>
      )}
    </div>
  );
});

        <div style={{fontSize:12, color:C.accent, fontWeight:800, marginBottom:10}}>あなたの今日の成績</div>
        <div style={{display:"flex", gap:8, marginBottom:12}}>
          {[{v:fmtYen(me.sales),l:"本日売上",c:C.gold},{v:"12件",l:"件数",c:C.green},{v:`★${me.rating}`,l:"評価",c:C.accent}].map(({v,l,c}) => (

            <span style={{color:C.t3}}>−</span>
            <div style={{flex:1}}><div style={{fontSize:11, color:C.t2, marginBottom:2}}>手数料</div><div style={{fontSize:15, fontWeight:800, color:C.red}}>{fmtYen(fee)}</div></div>

          <div key={r.userId} style={{background:isMe?C.aL:C.card, borderRadius:14, padding:"12px 14px", marginBottom:8, border:`1px solid ${isMe?C.accent+"33":C.b2}`, display:"flex", alignItems:"center", gap:12, animation:`rankIn .3s ease ${i*.05}s both`}}>
            <div style={{width:32, height:32, borderRadius:10, background:i<3?`${rC}20`:C.s2, display:"flex", alignItems:"center", justifyContent:"center", fontSize:i<3?18:14, fontWeight:900, color:i<3?rC:C.t2, border:`1px solid ${i<3?rC+"33":C.b2}`, flexShrink:0}}>{r.badge||r.rank}</div>
            <Av name={u.name} size={36} status={u.active}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:700, fontSize:14, display:"flex", alignItems:"center", gap:6}}>{u.name}{isMe && <span style={{fontSize:10, color:C.accent, fontWeight:700}}>(あなた)</span>}</div>

}

// ══ バトル ══
function BattleScreen({showToast}) {
  const me = DRIVERS[0];
  const [view, setView] = useState("list");
  const [active, setActive] = useState(null);
  const [cmts, setCmts] = useState(INIT_CMTS);
  const [txt, setTxt] = useState("");
  const [side, setSide] = useState("pro");
  const nid = useRef(300);
  const NG = ["死ね","殺","バカ","アホ","氏ね"];

  const tLeft = ts => { const d=ts-Date.now(); if(d<=0) return"終了"; const h=Math.floor(d/3600000); return h>=24?`${Math.floor(h/24)}日後終了`:`${h}時間後終了`; };
  const like = (tid, cid) => setCmts(p => ({...p, [tid]:p[tid].map(c => c.id===cid?{...c, liked:!c.liked, likes:c.liked?c.likes-1:c.likes+1}:c)}));
  const postCmt = () => {
    if(!txt.trim()) return;
    if(NG.some(w => txt.includes(w))) { showToast("⚠️ 不適切なワード"); return; }
    setCmts(p => ({...p, [active.id]:[...(p[active.id]||[]), {id:"c"+nid.current++, userId:me.id, text:txt.trim(), likes:0, liked:false, time:Date.now(), side}]}));
    setTxt(""); showToast("💬 投稿しました！");
  };

  if(view === "topic" && active) {
    const tc = cmts[active.id] || [];
    const tP = tc.filter(c => c.side==="pro").reduce((s,c)=>s+c.likes,0);
    const tC = tc.filter(c => c.side==="con").reduce((s,c)=>s+c.likes,0);
    const tot = tP+tC||1; const pct = Math.round(tP/tot*100);
    return (
      <div style={{display:"flex", flexDirection:"column", height:"calc(100vh - 57px - 56px)", overflow:"hidden"}}>
        <div style={{flexShrink:0, background:`linear-gradient(160deg,${active.color}12,#080808)`, padding:"12px 16px 10px", borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:10}}>
            <button onClick={() => setView("list")} style={{background:"none", border:"none", color:C.t2, fontSize:20, cursor:"pointer", padding:0, lineHeight:1}}>←</button>
            <div style={{width:34, height:34, borderRadius:10, background:`${active.color}20`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:17}}>{active.icon}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:900, fontSize:16}}>{active.theme}</div>
              <div style={{fontSize:10, color:C.t2}}>{tc.length}件 · {tLeft(active.end)}</div>
            </div>
          </div>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:5}}>
            <div><div style={{fontSize:10, color:C.blue, fontWeight:700}}>👍 賛成</div><div style={{fontSize:20, fontWeight:900, color:C.blue}}>{pct}<span style={{fontSize:11}}>%</span></div><div style={{fontSize:10, color:C.t2}}>❤️{tP}</div></div>
            <div style={{display:"flex", alignItems:"center"}}><div style={{fontSize:18}}>⚔️</div></div>
            <div style={{textAlign:"right"}}><div style={{fontSize:10, color:C.red, fontWeight:700}}>反対 👎</div><div style={{fontSize:20, fontWeight:900, color:C.red}}>{100-pct}<span style={{fontSize:11}}>%</span></div><div style={{fontSize:10, color:C.t2}}>❤️{tC}</div></div>
          </div>
          <div style={{height:9, background:C.b2, borderRadius:5, overflow:"hidden", display:"flex"}}>
            <div style={{width:`${pct}%`, background:`linear-gradient(90deg,${C.blue},#6ab0ff)`, transition:"width .5s"}}/>
            <div style={{flex:1, background:`linear-gradient(90deg,${C.red},#ff7070)`}}/>
          </div>
        </div>
        <div style={{flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch", padding:"12px 16px"}}>
          {tc.sort((a,b) => b.likes-a.likes).map(c => {
            const u = DRIVERS.find(d => d.id===c.userId) || DRIVERS[0];
            const sc = c.side==="pro"?C.blue:C.red;
            return (
              <div key={c.id} style={{background:C.card, borderRadius:16, padding:"12px 14px", marginBottom:10, border:`1px solid ${c.side==="pro"?C.blue+"20":C.red+"20"}`}}>
                <div style={{display:"flex", gap:10}}>
                  <Av name={u.name} size={36} status={u.active}/>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:4, flexWrap:"wrap"}}>
                      <span style={{fontWeight:700, fontSize:13}}>{u.name}</span>
                      <span style={{fontSize:10, padding:"1px 7px", borderRadius:6, background:`${sc}18`, color:sc, fontWeight:800}}>{c.side==="pro"?"👍 賛成":"👎 反対"}</span>
                      <span style={{fontSize:10, color:C.t3, marginLeft:"auto"}}>{ago(c.time)}</span>
                    </div>
                    <div style={{fontSize:14, color:C.text, lineHeight:1.6, marginBottom:8, wordBreak:"break-word"}}>{c.text}</div>
                    <button onClick={() => like(active.id, c.id)}
                      style={{display:"flex", alignItems:"center", gap:4, background:c.liked?C.rL:"none", border:`1px solid ${c.liked?C.red+"55":C.b2}`, borderRadius:20, padding:"6px 12px", color:c.liked?C.red:C.t2, fontSize:13, fontWeight:800, cursor:"pointer", fontFamily:"inherit"}}>
                      {c.liked?"❤️":"🤍"} {c.likes}
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
          {tc.length === 0 && <div style={{textAlign:"center", color:C.t3, padding:"40px 0", fontSize:13}}>まだコメントがありません。最初に投稿しよう！</div>}
        </div>
        <div style={{flexShrink:0, background:C.s1, borderTop:`1px solid ${C.border}`, padding:"10px 14px 12px"}}>
          <div style={{display:"flex", gap:6, marginBottom:8}}>
            <button onClick={() => setSide("pro")} style={{flex:1, padding:"7px 0", borderRadius:10, border:`2px solid ${side==="pro"?C.blue:C.b2}`, background:side==="pro"?C.bL:"transparent", color:side==="pro"?C.blue:C.t2, fontWeight:800, fontSize:12, cursor:"pointer", fontFamily:"inherit"}}>👍 賛成で投稿</button>
            <button onClick={() => setSide("con")} style={{flex:1, padding:"7px 0", borderRadius:10, border:`2px solid ${side==="con"?C.red:C.b2}`, background:side==="con"?C.rL:"transparent", color:side==="con"?C.red:C.t2, fontWeight:800, fontSize:12, cursor:"pointer", fontFamily:"inherit"}}>👎 反対で投稿</button>
          </div>
          <div style={{display:"flex", gap:8}}>
            <textarea value={txt} onChange={e => setTxt(e.target.value.slice(0,200))}
              placeholder={`「${active.theme}」について意見を書こう...`} rows={2}
              style={{flex:1, background:C.s2, border:`1px solid ${side==="pro"?C.blue+"44":C.red+"44"}`, borderRadius:12, padding:"9px 12px", color:C.text, fontSize:13, outline:"none", fontFamily:"inherit", resize:"none", lineHeight:1.5}}/>
            <button onClick={postCmt} style={{padding:"0 14px", background:side==="pro"?`linear-gradient(135deg,${C.blue},#2060cc)`:`linear-gradient(135deg,${C.red},#cc2030)`, color:"#fff", border:"none", borderRadius:12, fontWeight:900, fontSize:13, cursor:"pointer", fontFamily:"inherit", minWidth:50}}>送信</button>
          </div>
          <div style={{fontSize:10, color:C.t3, marginTop:4, textAlign:"right"}}>{200-txt.length}文字</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{paddingBottom:80, overflowY:"auto"}}>
      <div style={{background:"linear-gradient(160deg,#1a0800,#0d0300,#080808)", padding:"18px 16px 14px", borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontSize:26, fontWeight:900, marginBottom:4, display:"flex", alignItems:"center", gap:8}}>
          <span style={{animation:"vsFlash 2.5s ease-in-out infinite"}}>⚔️</span>
          <span style={{background:"linear-gradient(90deg,#FF6B00,#FF3D00)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent"}}>バトル</span>
          <span style={{fontSize:10, background:C.rL, color:C.red, border:`1px solid ${C.red}44`, padding:"2px 8px", borderRadius:8, fontWeight:800, WebkitTextFillColor:C.red}}>LIVE</span>
        </div>
        <div style={{fontSize:12, color:C.t2}}>意見を言い合ってバッジを獲得</div>
      </div>
      <div style={{padding:"14px 16px 0"}}>
        {BATTLE_TOPICS.map((topic, i) => {
          const tc = cmts[topic.id] || [];
          const pl = tc.filter(c=>c.side==="pro").reduce((s,c)=>s+c.likes,0);
          const cl = tc.filter(c=>c.side==="con").reduce((s,c)=>s+c.likes,0);
          const tot = pl+cl||1; const pct = Math.round(pl/tot*100);
          return (
            <div key={topic.id} onClick={() => { setActive(topic); setView("topic"); }} style={{background:C.card, borderRadius:18, padding:16, marginBottom:12, border:`1px solid ${C.b2}`, cursor:"pointer", animation:`slideUp .3s ease ${i*.06}s both`}}>
              <div style={{display:"flex", gap:12, marginBottom:12}}>
                <div style={{width:48, height:48, borderRadius:14, background:`${topic.color}18`, border:`1px solid ${topic.color}33`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22}}>{topic.icon}</div>
                <div style={{flex:1}}><div style={{fontWeight:900, fontSize:17, marginBottom:3}}>{topic.theme}</div><div style={{fontSize:12, color:C.t2, lineHeight:1.5}}>{topic.desc}</div></div>
              </div>
              <div style={{marginBottom:8}}>
                <div style={{display:"flex", justifyContent:"space-between", fontSize:11, marginBottom:4}}>
                  <span style={{color:C.blue, fontWeight:700}}>👍 賛成 {pct}%</span>
                  <span style={{color:C.red, fontWeight:700}}>{100-pct}% 反対 👎</span>
                </div>
                <div style={{height:8, background:C.b2, borderRadius:4, overflow:"hidden", display:"flex"}}>
                  <div style={{width:`${pct}%`, background:`linear-gradient(90deg,${C.blue},#6ab0ff)`, transition:"width .5s"}}/>
                  <div style={{flex:1, background:`linear-gradient(90deg,${C.red},#ff7070)`}}/>
                </div>
              </div>
              <div style={{display:"flex", gap:10, fontSize:11, color:C.t2}}>
                <span>💬 {tc.length}件</span><span>❤️ {pl+cl}</span>
                <span style={{marginLeft:"auto", color:topic.color, fontWeight:700, fontSize:10}}>{tLeft(topic.end)}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ══ ナビゲーション ══
const NAV = [
  {id:"tl",   icon:"📢", label:"TL"},
  {id:"order",icon:"🚗", label:"依頼"},
  {id:"map",  icon:"🗺️", label:"地図"},
  {id:"battle",icon:"⚔️",label:"バトル"},
  {id:"ranking",icon:"📊",label:"ランク"},
  {id:"settings",icon:"👤",label:"設定"},
];

// ══ メインApp ══
const ME = DRIVERS[0];

function App() {
  const [ready, setReady] = useState(false);
  const [loggedIn, setLoggedIn] = useState(false);
  const [currentUser, setCurrentUser] = useState(null);
  const [screen, setScreen] = useState("tl");
  const [posts, setPosts] = useState(INIT_POSTS);
  const [tlPosts, setTlPosts] = useState(INIT_TL);
  const [myStatus, setMyStatus] = useState("空き");
  const [chat, setChat] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [matching, setMatching] = useState(null);
  const [inProgress, setInProgress] = useState(null);
  const [filterSort, setFilterSort] = useState("新着順");
  const [filterStatus, setFilterStatus] = useState("すべて");
  const [tlText, setTlText] = useState("");
  const [toastMsg, setToastMsg] = useState(null);
  const [notif, setNotif] = useState(null);
  const [matchPop, setMatchPop] = useState(false);
  const [proposalPost, setProposalPost] = useState(null);
  const [matchedData, setMatchedData] = useState(null);
  const nextId = useRef(1000);
  const toastTimer = useRef(null);
  const scrollRef = useRef(null);

  useEffect(() => {
    (async () => {
      const {user} = await AUTH_PROVIDER.restoreSession();
      if(user) { setCurrentUser(user); setLoggedIn(true); }
      setReady(true);
      setTimeout(() => setNotif({msg:"新しい代行依頼が届きました", sub:"博多駅→天神 ¥3,200"}), 3000);
    })();
  }, []);

  useEffect(() => { if(scrollRef.current) scrollRef.current.scrollTop = 0; }, [screen]);

  const showToast = useCallback(msg => {
    setToastMsg(msg); clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(null), 2800);
  }, []);

  const handleLogin = useCallback(async user => { setCurrentUser(user); setLoggedIn(true); await KV.set("daiko:user", user); }, []);
  const handleLogout = useCallback(async () => { await AUTH_PROVIDER.signOut(); setCurrentUser(null); setLoggedIn(false); }, []);

  const handleAccept = useCallback(id => {
    const found = posts.find(x => x.id === id);
    setPosts(p => p.map(x => x.id===id ? {...x, status:"受付終了", accepted:ME.id} : x));
    if(found) setInProgress({from:found.from, to:found.to, driver:ME.name, eta:ME.eta});
    setMatchPop(true); setTimeout(() => setMatchPop(false), 1800);
    showToast("🎉 受注しました！");
  }, [posts, showToast]);

  const handleLike = useCallback(id => setPosts(p => p.map(x => x.id===id ? {...x, liked:!x.liked, likes:x.liked?x.likes-1:x.likes+1} : x)), []);
  const handleTlLike = useCallback(id => setTlPosts(p => p.map(x => x.id===id ? {...x, liked:!x.liked, likes:x.liked?x.likes-1:x.likes+1} : x)), []);
  const handleReply = useCallback((id, text) => setPosts(p => p.map(x => x.id===id ? {...x, replies:[...x.replies, {id:nextId.current++, userId:ME.id, text, time:Date.now()}]} : x)), []);
  const callDriver = useCallback(u => { const d = DRIVERS.find(x => x.id===u.id)||DRIVERS[0]; if(!d.active) { showToast("このドライバーは対応中です"); return; } setMatching({driver:d}); }, [showToast]);

  const handleNewPost = useCallback(({from, to, price, note, type, km}) => {
    const p = {id:"p"+nextId.current++, userId:ME.id, from, to, price, note:note||"", status:"募集中", time:Date.now(), dist:km?parseFloat(km.toFixed(1)):+(Math.random()*3+0.5).toFixed(1), km, likes:0, liked:false, replies:[], accepted:null, viewers:0, type:type||"request"};
    setPosts(prev => [p, ...prev]);
    showToast("✅ 投稿しました！");
    if(type === "request" || !type) setTimeout(() => setProposalPost(p), 400);
  }, [showToast]);

  const addTl = useCallback(() => {
    if(!tlText.trim()) return;
    setTlPosts(prev => [{id:"t"+nextId.current++, userId:ME.id, text:tlText, time:Date.now(), likes:0, liked:false, replies:[], status:"active"}, ...prev]);
    setTlText("");
  }, [tlText]);

  const filtered = useMemo(() =>
    posts.filter(p => filterStatus==="募集中のみ" ? p.status==="募集中" : true)
         .sort((a,b) => filterSort==="距離順"?a.dist-b.dist:filterSort==="金額順"?b.price-a.price:b.time-a.time),
  [posts, filterStatus, filterSort]);

  if(!ready) return (
    <div style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100vh", background:C.bg, gap:12, fontFamily:"'Noto Sans JP',sans-serif"}}>
      <style>{CSS}</style>
      <div style={{fontSize:42, animation:"float 1.5s ease-in-out infinite"}}>🚗</div>
      <div style={{fontSize:13, color:C.t2, fontWeight:500, letterSpacing:1}}>代行なう — 読み込み中</div>
    </div>
  );

  if(!loggedIn) return <LoginScreen onLogin={handleLogin}/>;

  return (
    <div style={{fontFamily:"'Noto Sans JP',sans-serif", background:C.bg, minHeight:"100vh", color:C.text, maxWidth:480, margin:"0 auto", display:"flex", flexDirection:"column"}}>
      <style>{CSS}</style>

      {/* オーバーレイ群 */}
      {notif && <ToastNotif msg={notif.msg} sub={notif.sub} onDone={() => setNotif(null)}/>}
      {toastMsg && <div style={{position:"fixed", bottom:88, left:"50%", transform:"translateX(-50%)", background:"#1e1e1e", color:C.text, padding:"10px 20px", borderRadius:20, fontSize:13, fontWeight:700, zIndex:8000, border:`1px solid ${C.b3}`, whiteSpace:"nowrap", animation:"fadeIn .25s ease"}}>{toastMsg}</div>}
      {matchPop && <div style={{position:"fixed", inset:0, zIndex:8500, display:"flex", alignItems:"center", justifyContent:"center", pointerEvents:"none"}}>
        <div style={{background:"linear-gradient(135deg,#00D26A,#00a050)", color:"#000", padding:"20px 40px", borderRadius:24, fontSize:26, fontWeight:900, animation:"matchPop .45s cubic-bezier(.34,1.56,.64,1)"}}>🤝 マッチ成立！</div>
      </div>}

      {/* チャットモーダル */}
      {chat && (
        <div style={{position:"fixed", inset:0, background:C.bg, zIndex:200, display:"flex", flexDirection:"column"}}>
          <div style={{background:C.s1, padding:"14px 16px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", gap:12}}>
            <button onClick={() => setChat(null)} style={{background:"none", border:"none", color:C.t2, fontSize:22, cursor:"pointer", padding:0, lineHeight:1}}>←</button>
            <Av name={DRIVERS.find(d=>d.id===chat.accepted)?.name||"?"} size={36} status={true}/>
            <div>
              <div style={{fontWeight:700, fontSize:15}}>{DRIVERS.find(d=>d.id===chat.accepted)?.name}</div>
              <div style={{fontSize:11, color:C.green, fontWeight:600}}>● オンライン</div>
            </div>
            <div style={{marginLeft:"auto", background:C.aL, border:`1px solid ${C.accent}22`, borderRadius:10, padding:"6px 12px", fontSize:11, color:C.accent, fontWeight:700}}>🚗 {chat.from}→{chat.to}</div>
          </div>
          <div style={{flex:1, overflowY:"auto", padding:16, display:"flex", flexDirection:"column", gap:10}}>
            <div style={{textAlign:"center", fontSize:11, color:C.t3, padding:"4px 14px", background:C.s2, borderRadius:14, alignSelf:"center"}}>🎉 マッチング成立</div>
            <div style={{display:"flex", gap:8, alignItems:"flex-end"}}>
              <Av name={DRIVERS.find(d=>d.id===chat.accepted)?.name||"?"} size={28}/>
              <div style={{maxWidth:"72%", background:C.s2, color:C.text, borderRadius:"18px 18px 18px 4px", padding:"10px 14px", fontSize:14, lineHeight:1.5}}>よろしくお願いします！向かっています🚗</div>
            </div>
          </div>
          <div style={{padding:"12px 16px", borderTop:`1px solid ${C.border}`, display:"flex", gap:8, background:C.s1}}>
            <input placeholder="メッセージを入力..." style={{flex:1, background:C.s2, border:`1px solid ${C.b2}`, borderRadius:24, padding:"10px 16px", color:C.text, fontSize:14, outline:"none", fontFamily:"inherit"}}/>
            <button style={{width:44, height:44, borderRadius:"50%", background:"#222", color:"#555", border:"none", fontSize:18, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>↑</button>
          </div>
        </div>
      )}

      {showForm && <PostForm onPost={handleNewPost} onClose={() => setShowForm(false)}/>}
      {matching && <MatchingOverlay driver={matching.driver} onCancel={() => setMatching(null)} onConfirm={() => { setInProgress({from:"現在地", to:"目的地", driver:matching.driver.name, eta:matching.driver.eta}); setMatching(null); setMatchPop(true); setTimeout(() => setMatchPop(false), 1800); showToast("🎉 マッチング完了！"); }}/>}
      {proposalPost && <ProposalModal post={proposalPost} onSelect={p => { setPosts(prev => prev.map(x => x.id===proposalPost.id?{...x, status:"受付終了", accepted:p.driver.id}:x)); setProposalPost(null); setMatchedData({proposal:p, post:proposalPost}); }} onClose={() => setProposalPost(null)}/>}
      {matchedData && <MatchedScreen proposal={matchedData.proposal} post={matchedData.post} onClose={() => { setMatchedData(null); showToast("✅ 取引を管理中です"); }}/>}

      {/* トップバー */}
      <div style={{background:C.s1, padding:"13px 16px 11px", borderBottom:`1px solid ${C.border}`, position:"sticky", top:0, zIndex:50}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div style={{display:"flex", alignItems:"center", gap:8}}>
            <div style={{display:"flex", alignItems:"baseline"}}>
              <span style={{fontWeight:900, fontSize:20, color:C.text, letterSpacing:"-.5px"}}>代行</span>
              <span style={{fontWeight:900, fontSize:20, color:C.accent, letterSpacing:"-.5px"}}>なう</span>
            </div>
            <span style={{fontSize:10, color:C.green, fontWeight:700, display:"flex", alignItems:"center", gap:4, background:C.gL, padding:"3px 8px", borderRadius:10, border:`1px solid ${C.green}22`}}>
              <span style={{width:5, height:5, borderRadius:"50%", background:C.green, display:"inline-block", animation:"blink 1.4s ease-in-out infinite"}}/>{ONLINE}人
            </span>
          </div>
          <div style={{display:"flex", gap:8, alignItems:"center"}}>
            <div style={{display:"flex", background:C.s2, borderRadius:16, overflow:"hidden", border:`1px solid ${C.b2}`}}>
              {["空き","対応中"].map(s => (
                <button key={s} onClick={() => setMyStatus(s)} style={{padding:"6px 11px", fontWeight:700, fontSize:11, border:"none", cursor:"pointer", fontFamily:"inherit", background:myStatus===s?(s==="空き"?C.green:"#7a0000"):"transparent", color:myStatus===s?"#000":C.t2}}>
                  {s==="空き"?"● 空き":"● 対応中"}
                </button>
              ))}
            </div>
            <button onClick={() => setShowForm(true)} style={{padding:"8px 13px", background:"linear-gradient(135deg,#FF6B00,#FF3D00)", color:"#000", border:"none", borderRadius:16, fontWeight:800, fontSize:12, cursor:"pointer", fontFamily:"inherit"}}>＋ 投稿</button>
          </div>
        </div>
      </div>

      {/* コンテンツ */}
      <div ref={scrollRef} style={{flex:1, overflowY:screen==="battle"?"hidden":"auto", paddingBottom:screen==="battle"?0:72, display:"flex", flexDirection:"column"}}>

        {inProgress && (
          <div style={{background:"linear-gradient(135deg,rgba(0,210,106,.07),rgba(0,160,80,.03))", borderBottom:`1px solid ${C.green}22`, padding:"10px 16px", display:"flex", alignItems:"center", gap:10, flexShrink:0}}>
            <div style={{fontSize:18, animation:"float 1.5s ease-in-out infinite"}}>🚗</div>
            <div style={{flex:1}}><div style={{fontSize:12, color:C.green, fontWeight:800}}>ドライバーが向かっています</div><div style={{fontSize:11, color:C.t2, marginTop:1}}>{inProgress.from} → {inProgress.to}</div></div>
            <div style={{textAlign:"right", marginRight:8}}><div style={{fontSize:18, fontWeight:900, color:C.green}}>{inProgress.eta}分</div><div style={{fontSize:10, color:C.t2}}>到着</div></div>
            <button onClick={() => { setInProgress(null); showToast("✅ 取引完了！"); }} style={{background:"none", border:`1px solid ${C.green}33`, borderRadius:10, padding:"4px 10px", color:C.green, fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:700}}>完了</button>
          </div>
        )}

        {/* TL */}
        {screen === "tl" && <div style={{flex:1}}>
          <div style={{background:C.s1, borderBottom:`1px solid ${C.border}`, padding:"10px 16px", position:"sticky", top:57, zIndex:40}}>
            <div style={{display:"flex", gap:5, alignItems:"center"}}>
              {["すべて","募集中のみ"].map(s => (
                <button key={s} onClick={() => setFilterStatus(s)} style={{padding:"5px 13px", borderRadius:14, border:`1px solid ${filterStatus===s?C.accent:C.b2}`, background:filterStatus===s?C.aL:"transparent", color:filterStatus===s?C.accent:C.t2, fontSize:12, fontWeight:filterStatus===s?700:400, cursor:"pointer", fontFamily:"inherit"}}>
                  {s==="募集中のみ"?"🟢 "+s:s}
                </button>
              ))}
              <div style={{marginLeft:"auto", display:"flex", gap:4}}>
                {["新着順","距離順","金額順"].map(s => (
                  <button key={s} onClick={() => setFilterSort(s)} style={{padding:"4px 9px", borderRadius:12, border:`1px solid ${filterSort===s?C.blue:C.b2}`, background:filterSort===s?C.bL:"transparent", color:filterSort===s?C.blue:C.t2, fontSize:11, fontWeight:filterSort===s?700:400, cursor:"pointer", fontFamily:"inherit"}}>{s}</button>
                ))}
              </div>
            </div>
          </div>
          <div style={{background:C.s1, borderBottom:`1px solid ${C.border}`, padding:"12px 16px"}}>
            <div style={{display:"flex", gap:10, alignItems:"flex-start"}}>
              <Av name={ME.name} size={38} status={true}/>
              <div style={{flex:1}}>
                <textarea value={tlText} onChange={e => setTlText(e.target.value.slice(0,140))} placeholder="稼働情報・ひとことを投稿..." rows={2}
                  style={{width:"100%", background:"transparent", border:"none", color:C.text, fontSize:14, resize:"none", outline:"none", fontFamily:"inherit", lineHeight:1.5}}/>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:4}}>
                  <div style={{display:"flex", gap:6}}>
                    <button onClick={() => setShowForm(true)} style={{background:"none", border:`1px solid ${C.b2}`, borderRadius:14, padding:"5px 10px", color:C.accent, fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:700}}>🚗 依頼</button>
                    <button onClick={() => setShowForm(true)} style={{background:"none", border:`1px solid ${C.b2}`, borderRadius:14, padding:"5px 10px", color:C.blue, fontSize:11, cursor:"pointer", fontFamily:"inherit", fontWeight:700}}>🔄 帰り便</button>
                  </div>
                  <div style={{display:"flex", alignItems:"center", gap:8}}>
                    <span style={{fontSize:11, color:140-tlText.length<=20?C.red:C.t3}}>{140-tlText.length}</span>
                    <button onClick={addTl} disabled={!tlText.trim()} style={{padding:"6px 16px", background:tlText.trim()?"linear-gradient(135deg,#FF6B00,#FF3D00)":"#222", color:tlText.trim()?"#000":"#444", border:"none", borderRadius:16, fontWeight:800, fontSize:12, cursor:tlText.trim()?"pointer":"default", fontFamily:"inherit"}}>投稿</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          {filtered.length === 0 && <div style={{textAlign:"center", color:C.t3, padding:"50px 20px", fontSize:14}}>条件に合う依頼がありません</div>}
          {filtered.map(p => <PostCard key={p.id} post={p} me={ME} onAccept={handleAccept} onLike={handleLike} onReply={handleReply} onChat={setChat} onCallDriver={callDriver}/>)}
          <div style={{padding:"8px 16px", fontSize:10, color:C.t3, borderBottom:`1px solid ${C.border}`, letterSpacing:1.5, fontWeight:600}}>── つぶやき</div>
          {tlPosts.map(t => {
            const u = DRIVERS.find(d => d.id===t.userId) || DRIVERS[0];
            return (
              <div key={t.id} style={{padding:"14px 16px", borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex", gap:12}}>
                  <Av name={u.name} size={44} status={t.status==="active"}/>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:4}}>
                      <span style={{fontWeight:700, fontSize:15}}>{u.name}</span>
                      <span style={{fontSize:10, padding:"1px 7px", borderRadius:6, background:t.status==="active"?C.gL:C.rL, color:t.status==="active"?C.green:C.red, fontWeight:700}}>{t.status==="active"?"🟢 稼働中":"🔴 対応中"}</span>
                      <span style={{fontSize:11, color:C.t3, marginLeft:"auto"}}>{ago(t.time)}</span>
                    </div>
                    <div style={{fontSize:14, color:"#d0d0d0", lineHeight:1.65, marginBottom:8}}>{t.text}</div>
                    <div style={{display:"flex", gap:4, alignItems:"center"}}>
                      <button onClick={() => handleTlLike(t.id)} style={{display:"flex", alignItems:"center", gap:4, background:"none", border:"none", cursor:"pointer", color:t.liked?C.red:C.t3, fontSize:13, padding:"4px 0", fontFamily:"inherit"}}>
                        {t.liked?"❤️":"🤍"}{t.likes > 0 && <span>{t.likes}</span>}
                      </button>
                      {t.status === "active" && <button onClick={() => callDriver(u)} style={{marginLeft:"auto", display:"flex", alignItems:"center", gap:5, padding:"7px 14px", background:"linear-gradient(135deg,#FF6B00,#FF3D00)", color:"#000", border:"none", borderRadius:20, fontSize:12, fontWeight:900, cursor:"pointer", fontFamily:"inherit"}}>🚗 このドライバーを呼ぶ</button>}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>}

        {/* 依頼 */}
        {screen === "order" && <div style={{padding:16}}>
          <div style={{fontSize:18, fontWeight:900, marginBottom:4}}>🚗 代行を呼ぶ</div>
          <div style={{fontSize:12, color:C.t2, marginBottom:16}}>ワンタップで最短マッチング</div>
          <button onClick={() => setMatching({driver:DRIVERS[0]})} style={{width:"100%", padding:0, background:"none", border:"none", cursor:"pointer", fontFamily:"inherit", marginBottom:20}}>
            <div style={{background:"linear-gradient(135deg,#FF6B00,#FF3D00)", borderRadius:20, overflow:"hidden", animation:"ctaPulse 2.5s ease-in-out infinite"}}>
              <div style={{padding:"18px 20px 14px", display:"flex", alignItems:"center", gap:14}}>
                <div style={{fontSize:30}}>🚗</div>
                <div style={{flex:1, textAlign:"left"}}>
                  <div style={{fontSize:20, fontWeight:900, color:"#000", lineHeight:1.1}}>今すぐ代行を呼ぶ</div>
                  <div style={{fontSize:12, color:"rgba(0,0,0,.6)", marginTop:3}}>{DRIVERS[0].name} ★{DRIVERS[0].rating} · {DRIVERS[0].dist}km</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:28, fontWeight:900, color:"#000", lineHeight:1}}>{DRIVERS[0].eta}<span style={{fontSize:14, fontWeight:700}}>分</span></div>
                  <div style={{fontSize:12, color:"rgba(0,0,0,.55)", fontWeight:700}}>{fmtYen(DRIVERS[0].price)}〜</div>
                </div>
              </div>
              <div style={{background:"rgba(0,0,0,.16)", padding:"7px 20px", display:"flex", alignItems:"center", justifyContent:"space-between"}}>
                <div style={{fontSize:11, color:"rgba(0,0,0,.65)", fontWeight:700, display:"flex", alignItems:"center", gap:5}}>
                  <span style={{width:6, height:6, borderRadius:"50%", background:"rgba(0,0,0,.5)", display:"inline-block", animation:"blink .9s ease-in-out infinite"}}/>{ONLINE}台待機中
                </div>
                <div style={{fontSize:11, color:"rgba(0,0,0,.65)", fontWeight:700}}>あと{rnd(2,5)}台 ›</div>
              </div>
            </div>
          </button>
          <div style={{fontSize:13, fontWeight:700, color:C.t2, marginBottom:12}}>他のドライバー</div>
          {DRIVERS.slice(1).map(d => (
            <div key={d.id} onClick={() => d.active && setMatching({driver:d})} style={{background:C.card, borderRadius:14, padding:"12px 14px", marginBottom:8, border:`1px solid ${C.b2}`, display:"flex", alignItems:"center", gap:12, cursor:d.active?"pointer":"default", opacity:d.active?1:.55}}>
              <Av name={d.name} size={44} status={d.active}/>
              <div style={{flex:1}}><div style={{fontWeight:700, fontSize:14, marginBottom:3}}>{d.name}</div><div style={{display:"flex", gap:4, flexWrap:"wrap"}}>{d.tags.map(t => <Tag key={t} label={t}/>)}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:20, fontWeight:900, color:d.active?C.accent:C.t3}}>{d.active?`${d.eta}分`:"対応中"}</div><div style={{fontSize:11, color:C.t2}}>{fmtYen(d.price)}〜</div></div>
            </div>
          ))}
        </div>}

        {/* 地図 */}
        {screen === "map" && <MapScreen/>}

        {/* バトル */}
        {screen === "battle" && <div style={{flex:1, overflow:"hidden", display:"flex", flexDirection:"column"}}><BattleScreen showToast={showToast}/></div>}

        {/* ランキング */}
        {screen === "ranking" && <RankingScreen/>}

        {/* 設定 */}
        {screen === "settings" && <SettingsScreen user={currentUser||ME} onLogout={handleLogout} onUpdateUser={u => setCurrentUser(prev => ({...prev, ...u}))}/>}
      </div>

      {/* ボトムナビ */}
      <div style={{position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:"rgba(8,8,8,.97)", borderTop:`1px solid ${C.border}`, display:"flex", backdropFilter:"blur(16px)", zIndex:100}}>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setScreen(n.id)} style={{flex:1, padding:"10px 0 14px", background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, fontFamily:"inherit", color:screen===n.id?C.accent:C.t3, transition:"color .15s"}}>
            <span style={{fontSize:18, lineHeight:1}}>{n.icon}</span>
            <span style={{fontSize:9, fontWeight:screen===n.id?700:400, letterSpacing:.3}}>{n.label}</span>
            {screen===n.id && <div style={{width:18, height:2, borderRadius:1, background:C.accent, marginTop:1}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="ja">
<head>

// ══ 料金計算 ══
const FARE_TABLE = [{maxKm:2,base:1500,perKm:400},{maxKm:5,base:2200,perKm:350},{maxKm:10,base:3400,perKm:300},{maxKm:20,base:5400,perKm:250},{maxKm:999,base:8000,perKm:200}];
const calcFare = km => {
  if(!km||km<=0) return null;
  const h = new Date().getHours(), isLate = h>=23||h<5;
  const tier = FARE_TABLE.find(t=>km<=t.maxKm)||FARE_TABLE[4];
  const fare = Math.ceil((tier.base + Math.max(0,km-1)*tier.perKm)*(isLate?1.3:1)/100)*100;
  return { fare, isLate, km, tier, min:Math.round(fare*.9), max:Math.round(fare*1.1) };
};
const calcFee = fare => { if(!fare) return null; const fee=Math.ceil(fare*.1/10)*10; return {fare,fee,net:fare-fee}; };

const SPOTS = {
  "博多駅":{lat:33.5904,lon:130.4207},"天神":{lat:33.5902,lon:130.3976},
  "福岡空港":{lat:33.5839,lon:130.4511},"中洲":{lat:33.5920,lon:130.4065},

  "太宰府":{lat:33.5126,lon:130.5302},"姪浜":{lat:33.5815,lon:130.3444},
};
const getKm = (from,to) => {
  const f = Object.entries(SPOTS).find(([k])=>from.includes(k));
  const t = Object.entries(SPOTS).find(([k])=>to.includes(k));
  if(!f||!t) return null;
  const R=6371, dL=(t[1].lat-f[1].lat)*Math.PI/180, dO=(t[1].lon-f[1].lon)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(f[1].lat*Math.PI/180)*Math.cos(t[1].lat*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};
