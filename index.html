    if(prev===key){delete rb[uid];rs[key]=Math.max(0,(rs[key]||1)-1);}
    else{if(prev)rs[prev]=Math.max(0,(rs[prev]||1)-1);rb[uid]=key;rs[key]=(rs[key]||0)+1;}
    await sb.patch("posts",post.id,{reactions:rs,reacted_by:rb});
    loadData();
  };

  const submitReply=async(pid)=>{
    if(!replyText.trim()||!role)return;
    await sb.post("replies",{id:"r"+Date.now()+Math.random().toString(36).slice(2,5),post_id:pid,role,uid,text:replyText.trim(),created_at:Date.now()});
    setReplyText("");setReplyTo(null);loadData();
  };

  const deletePost=async(id)=>{await sb.del("posts",id);loadData();};

  const totalR=p=>Object.values(p.reactions||{}).reduce((a,v)=>a+v,0);
  const sorted=useMemo(()=>{
    let list=[...posts];
    if(filter==="hot")list.sort((a,b)=>totalR(b)-totalR(a));
    else if(filter==="new")list.sort((a,b)=>b.created_at-a.created_at);
    else list=list.filter(p=>p.role===filter).sort((a,b)=>b.created_at-a.created_at);
    return list;
  },[posts,filter]);
  const stats=useMemo(()=>({c:posts.filter(p=>p.role==="customer").length,d:posts.filter(p=>p.role==="driver").length}),[posts]);

  const share=(p)=>{
    const rc=RC[p.role];
    const text=`${rc.emoji}${rc.label}「${p.text.slice(0,60)}」\n\n⚔️ お客 vs 運転手 バトル中！\n#代行なう #運転代行\nhttps://daikounaw.com`;
    if(navigator.share)navigator.share({text}).catch(()=>{});
    else window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,"_blank");
  };

  if(!role)return(
<div style={{paddingBottom:80}}><div style={{padding:"40px 20px",textAlign:"center"}}>
  <div style={{fontSize:50,marginBottom:8}}>⚔️</div>
  <div style={{marginBottom:4}}><span style={{fontWeight:900,fontSize:24}}>代行</span><span style={{fontWeight:900,fontSize:24,color:C.accent}}>なう</span></div>
  <div style={{fontSize:14,color:C.t2,lineHeight:1.7,marginBottom:30}}>お客 vs 運転手<br/>匿名バトル掲示板</div>
  <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>あなたの立場は？</div>
  <div style={{display:"flex",gap:12,maxWidth:320,margin:"0 auto"}}>
    <button onClick={()=>pickRole("customer")} style={{flex:1,padding:"24px 0",background:`linear-gradient(135deg,rgba(74,144,255,.12),rgba(74,144,255,.04))`,border:`2px solid ${C.blue}55`,borderRadius:20,cursor:"pointer",fontFamily:"inherit",color:C.text}}>
      <div style={{fontSize:40,marginBottom:6}}>🍺</div><div style={{fontSize:18,fontWeight:900,color:C.blue}}>お客</div>
    </button>
    <button onClick={()=>pickRole("driver")} style={{flex:1,padding:"24px 0",background:`linear-gradient(135deg,rgba(255,107,0,.12),rgba(255,107,0,.04))`,border:`2px solid ${C.accent}55`,borderRadius:20,cursor:"pointer",fontFamily:"inherit",color:C.text}}>
      <div style={{fontSize:40,marginBottom:6}}>🚗</div><div style={{fontSize:18,fontWeight:900,color:C.accent}}>運転手</div>
    </button>
  </div>
  <div style={{fontSize:11,color:C.t3,marginTop:16}}>匿名 · 変更OK</div>
</div></div>);

  const rc=RC[role];
  return(
<div style={{paddingBottom:80}}>
  {/* VS */}
  <div style={{padding:"14px 16px 10px",background:"linear-gradient(160deg,rgba(170,85,255,.12),rgba(255,107,0,.08),#060609)",borderBottom:`1px solid ${C.purple}33`}}>
    <div style={{display:"flex",alignItems:"center",marginBottom:6}}>
      <div style={{flex:1,textAlign:"center"}}><div style={{fontSize:30,fontWeight:900,color:C.blue,animation:"countUp .4s ease"}}>{stats.c}</div><div style={{fontSize:12,fontWeight:900,color:C.blue}}>🍺 お客</div></div>
      <div style={{fontSize:28,fontWeight:900,color:C.purple,animation:"vs 2.5s ease infinite",padding:"0 10px"}}>⚔️</div>
      <div style={{flex:1,textAlign:"center"}}><div style={{fontSize:30,fontWeight:900,color:C.accent,animation:"countUp .4s ease"}}>{stats.d}</div><div style={{fontSize:12,fontWeight:900,color:C.accent}}>🚗 運転手</div></div>
    </div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
      <span style={{fontSize:11,padding:"2px 8px",borderRadius:8,fontWeight:700,background:rc.bg,color:rc.color,border:`1px solid ${rc.bd}`}}>{rc.emoji} {rc.label}</span>
      <button onClick={()=>{setRole(null);localStorage.removeItem("dn_role");}} style={{background:"none",border:`1px solid ${C.b2}`,borderRadius:8,padding:"2px 8px",color:C.t3,fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>変更</button>
    </div>
  </div>

  {/* フィルター */}
  <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,position:"sticky",top:46,zIndex:40,background:C.s1}}>
    {[{id:"hot",l:"🔥 注目"},{id:"new",l:"🆕 新着"},{id:"customer",l:"🍺"},{id:"driver",l:"🚗"}].map(f=>(
      <button key={f.id} onClick={()=>setFilter(f.id)} style={{flex:1,padding:"9px 0",border:"none",borderBottom:filter===f.id?`2px solid ${C.accent}`:"2px solid transparent",background:"transparent",color:filter===f.id?C.text:C.t3,fontSize:12,fontWeight:filter===f.id?700:400,cursor:"pointer",fontFamily:"inherit"}}>{f.l}</button>
    ))}
  </div>

  {/* 投稿フォーム */}
  {composeOpen&&(
  <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,background:C.s2,animation:"fadeIn .15s ease"}}>
    <textarea value={composeText} onChange={e=>setComposeText(e.target.value)} placeholder={role==="customer"?"お客の本音を投稿…":"運転手の本音を投稿…"} rows={3} style={{width:"100%",background:C.card,border:`1px solid ${C.b2}`,borderRadius:14,padding:"12px 14px",color:C.text,fontSize:15,outline:"none",resize:"none",fontFamily:"inherit",marginBottom:6}}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:11,color:C.t3}}>{rc.emoji} {rc.label}として投稿</span>
      <div style={{display:"flex",gap:6}}>
        <button onClick={()=>{setComposeOpen(false);setComposeText("");}} style={{padding:"8px 14px",background:C.s2,border:`1px solid ${C.b2}`,borderRadius:10,color:C.t2,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>取消</button>
        <button onClick={submitPost} disabled={!composeText.trim()||posting} style={{padding:"8px 18px",background:composeText.trim()&&!posting?"linear-gradient(135deg,#FF6B00,#FF3D00)":"#333",color:composeText.trim()&&!posting?"#000":"#666",border:"none",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{posting?"送信中...":"投稿🔥"}</button>
      </div>
    </div>
  </div>)}

  {/* ローディング */}
  {loading&&<div style={{textAlign:"center",padding:"40px 0",color:C.t3}}><div style={{display:"inline-block",width:24,height:24,border:`3px solid ${C.b2}`,borderTop:`3px solid ${C.accent}`,borderRadius:"50%",animation:"spin .8s linear infinite"}}/><div style={{marginTop:8,fontSize:13}}>読み込み中...</div></div>}

  {/* 投稿一覧 */}
  {!loading&&sorted.length===0&&(
  <div style={{textAlign:"center",padding:"50px 20px"}}><div style={{fontSize:50,marginBottom:10}}>⚔️</div><div style={{fontSize:16,fontWeight:900,marginBottom:6}}>まだバトルが始まっていません</div><div style={{fontSize:13,color:C.t2}}>最初の投稿で火をつけよう🔥</div></div>)}

  {sorted.map((p,idx)=>{
    const prc=RC[p.role];const isMe=p.uid===uid;
    const myReact=(p.reacted_by||{})[uid];
    const hot=totalR(p)>=3;
    const pReplies=replies[p.id]||[];
    return(
    <div key={p.id} style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,animation:`slideUp .15s ease ${Math.min(idx,10)*.02}s both`}}>
      <div style={{display:"flex",gap:10}}>
        <div style={{width:42,height:42,borderRadius:"50%",background:`linear-gradient(${prc.grad})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,boxShadow:hot?`0 0 12px ${prc.color}44`:undefined}}>{prc.emoji}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <span style={{fontSize:12,padding:"2px 8px",borderRadius:8,fontWeight:700,background:prc.bg,color:prc.color,border:`1px solid ${prc.bd}`}}>{prc.label}</span>
            {hot&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:6,fontWeight:700,background:C.rL,color:C.red,border:`1px solid ${C.red}33`,animation:"fire .8s ease infinite"}}>🔥炎上</span>}
            {isMe&&<span style={{fontSize:10,color:C.t3}}>あなた</span>}
            <span style={{fontSize:10,color:C.t3,marginLeft:"auto"}}>{ago(p.created_at)}</span>
          </div>
          <div style={{fontSize:15,color:"#ddd",lineHeight:1.75,marginBottom:8,wordBreak:"break-word"}}>{p.text}</div>

          {pReplies.length>0&&(
          <div style={{marginBottom:8,marginLeft:6,borderLeft:`2px solid ${C.b2}`,paddingLeft:10}}>
            {pReplies.slice(-3).map(r=>{const rrc=RC[r.role];return(
              <div key={r.id} style={{marginBottom:5}}><span style={{fontSize:10,padding:"1px 5px",borderRadius:5,fontWeight:700,background:rrc.bg,color:rrc.color}}>{rrc.emoji}</span><span style={{fontSize:13,color:C.t2,marginLeft:6}}>{r.text}</span></div>
            );})}
            {pReplies.length>3&&<div style={{fontSize:11,color:C.t3}}>他{pReplies.length-3}件</div>}
          </div>)}

          <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
            {REACTIONS.map(rx=>{
              const count=(p.reactions||{})[rx.key]||0;const active=myReact===rx.key;
              return(<button key={rx.key} onClick={()=>react(p,rx.key)} style={{display:"flex",alignItems:"center",gap:3,padding:"4px 10px",background:active?`${prc.color}15`:"transparent",border:`1px solid ${active?prc.color+"44":C.b2}`,borderRadius:20,fontSize:12,color:active?prc.color:C.t3,cursor:"pointer",fontFamily:"inherit",fontWeight:active?700:400}}>{rx.emoji}{count>0&&<span style={{fontSize:11}}>{count}</span>}</button>);
            })}
            <button onClick={()=>setReplyTo(replyTo===p.id?null:p.id)} style={{display:"flex",alignItems:"center",gap:3,padding:"4px 10px",background:"transparent",border:`1px solid ${replyTo===p.id?C.blue+"44":C.b2}`,borderRadius:20,fontSize:12,color:replyTo===p.id?C.blue:C.t3,cursor:"pointer",fontFamily:"inherit"}}>💬{pReplies.length>0&&` ${pReplies.length}`}</button>
            <button onClick={()=>share(p)} style={{padding:"4px 10px",background:"transparent",border:`1px solid ${C.b2}`,borderRadius:20,fontSize:12,color:C.t3,cursor:"pointer",fontFamily:"inherit"}}>📤</button>
            {isMe&&<button onClick={()=>deletePost(p.id)} style={{padding:"4px 8px",background:"transparent",border:`1px solid ${C.b2}`,borderRadius:20,fontSize:11,color:C.t3,cursor:"pointer",fontFamily:"inherit",marginLeft:"auto"}}>🗑</button>}
          </div>

          {replyTo===p.id&&(
          <div style={{marginTop:8,display:"flex",gap:6,animation:"fadeIn .15s ease"}}>
            <input value={replyText} onChange={e=>setReplyText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")submitReply(p.id);}} placeholder="返信..." style={{flex:1,background:C.card,border:`1px solid ${C.b2}`,borderRadius:10,padding:"8px 12px",color:C.text,fontSize:13,outline:"none",fontFamily:"inherit"}}/>
            <button onClick={()=>submitReply(p.id)} disabled={!replyText.trim()} style={{padding:"8px 14px",background:replyText.trim()?C.accent:"#333",color:replyText.trim()?"#000":"#666",border:"none",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>送信</button>
          </div>)}
        </div>
      </div>
    </div>);})}

  <button onClick={()=>setComposeOpen(!composeOpen)} style={{position:"fixed",bottom:72,right:Math.max(16,(window.innerWidth-480)/2+16),width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,#FF6B00,#FF3D00)",border:"none",color:"#000",fontSize:24,cursor:"pointer",boxShadow:"0 4px 20px rgba(255,107,0,.4)",zIndex:90,display:"flex",alignItems:"center",justifyContent:"center",animation:"ctaPulse 2.5s ease infinite"}}>✏️</button>
</div>);
}

/* ═══ 🚗 業者一覧 ═══ */
function CompanyScreen(){
  const[companies,setCompanies]=useState([]);
  const[loading,setLoading]=useState(true);
  const[km,setKm]=useState("");const[pf,setPf]=useState("すべて");const[q,setQ]=useState("");
  const[showR,setShowR]=useState(false);const kmN=parseFloat(km);
  const[regOpen,setRegOpen]=useState(false);
  const[rName,setRName]=useState("");const[rPhone,setRPhone]=useState("");const[rLine,setRLine]=useState("");
  const[rPref,setRPref]=useState("福岡県");const[rArea,setRArea]=useState("");const[rHours,setRHours]=useState("");
  const[rBase,setRBase]=useState("2000");const[rPer,setRPer]=useState("500");const[rCamp,setRCamp]=useState("");
  const[rDone,setRDone]=useState(false);const[rPosting,setRPosting]=useState(false);

  const loadCompanies=useCallback(async()=>{const c=await sb.get("companies","order=featured.desc,created_at.asc");setCompanies(c||[]);setLoading(false);},[]);
  useEffect(()=>{loadCompanies();},[loadCompanies]);

  const fc=useMemo(()=>{let l=companies;if(pf!=="すべて")l=l.filter(c=>c.pref===pf);if(q.trim())l=l.filter(c=>c.name.includes(q)||c.area?.includes(q));return l;},[companies,pf,q]);
  const prefs=useMemo(()=>[...new Set(companies.map(c=>c.pref))].sort(),[companies]);

  const submitReg=async()=>{
    if(!rName.trim()||!rPhone.trim()||rPosting)return;
    setRPosting(true);
    await sb.post("companies",{id:"co_"+Date.now(),name:rName.trim(),phone:rPhone.trim(),line:rLine.trim()||null,pref:rPref,area:rArea.trim()||rPref,hours:rHours.trim()||"未設定",base_fare:parseInt(rBase)||2000,per_km:parseInt(rPer)||500,campaign:rCamp.trim()||null,featured:false,created_at:Date.now()});
    setRPosting(false);setRDone(true);loadCompanies();
  };

  return(
<div style={{paddingBottom:80}}>
  <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
      <div style={{fontSize:18,fontWeight:900}}>🚗 代行業者</div>
      <button onClick={()=>{setRegOpen(!regOpen);setRDone(false);}} style={{padding:"6px 12px",background:regOpen?C.s2:"linear-gradient(135deg,#FF6B00,#FF3D00)",color:regOpen?C.t2:"#000",border:regOpen?`1px solid ${C.b2}`:"none",borderRadius:10,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{regOpen?"閉じる":"＋ 無料掲載"}</button>
    </div>
    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
      <input value={km} onChange={e=>{setKm(e.target.value);setShowR(false);}} type="number" inputMode="decimal" placeholder="距離km" style={{...iS,flex:1,marginBottom:0,textAlign:"center"}}/>
      <button onClick={()=>setShowR(true)} disabled={!kmN} style={{padding:"10px 16px",background:kmN?"linear-gradient(135deg,#FF6B00,#FF3D00)":"#222",color:kmN?"#000":"#555",border:"none",borderRadius:12,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>比較</button>
    </div>
    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 検索" style={{...iS,fontSize:12}}/>
    <div style={{display:"flex",gap:5,overflowX:"auto"}}>
      <button onClick={()=>setPf("すべて")} style={{flexShrink:0,background:pf==="すべて"?C.accent:"transparent",color:pf==="すべて"?"#000":C.t2,border:`1px solid ${pf==="すべて"?C.accent:C.b2}`,borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>全国</button>
      {prefs.map(p=>(<button key={p} onClick={()=>setPf(p)} style={{flexShrink:0,background:pf===p?C.accent:"transparent",color:pf===p?"#000":C.t2,border:`1px solid ${pf===p?C.accent:C.b2}`,borderRadius:20,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{p}</button>))}
    </div>
  </div>

  {/* 登録フォーム */}
  {regOpen&&!rDone&&(
  <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,background:C.s2,animation:"fadeIn .15s ease"}}>
    <div style={{fontSize:14,fontWeight:700,color:C.accent,marginBottom:8}}>無料で業者掲載</div>
    <input value={rName} onChange={e=>setRName(e.target.value)} placeholder="業者名 *" style={iS}/>
    <input value={rPhone} onChange={e=>setRPhone(e.target.value)} placeholder="電話番号 *" type="tel" style={iS}/>
    <input value={rLine} onChange={e=>setRLine(e.target.value)} placeholder="LINE URL（任意）" style={iS}/>
    <select value={rPref} onChange={e=>setRPref(e.target.value)} style={{...iS,appearance:"none"}}>{PREFS.map(p=><option key={p}>{p}</option>)}</select>
    <input value={rArea} onChange={e=>setRArea(e.target.value)} placeholder="対応エリア" style={iS}/>
    <input value={rHours} onChange={e=>setRHours(e.target.value)} placeholder="営業時間" style={iS}/>
    <div style={{display:"flex",gap:8}}><input value={rBase} onChange={e=>setRBase(e.target.value)} type="number" placeholder="初乗り円" style={{...iS,flex:1}}/><input value={rPer} onChange={e=>setRPer(e.target.value)} type="number" placeholder="1km円" style={{...iS,flex:1}}/></div>
    <input value={rCamp} onChange={e=>setRCamp(e.target.value)} placeholder="キャンペーン（任意）" style={iS}/>
    <button onClick={submitReg} disabled={!rName||!rPhone||rPosting} style={{width:"100%",padding:"13px 0",background:rName&&rPhone&&!rPosting?"linear-gradient(135deg,#FF6B00,#FF3D00)":"#333",color:rName&&rPhone&&!rPosting?"#000":"#666",border:"none",borderRadius:14,fontWeight:900,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}>{rPosting?"登録中...":"✅ 掲載する（無料）"}</button>
  </div>)}
  {regOpen&&rDone&&(<div style={{padding:"20px 16px",textAlign:"center",borderBottom:`1px solid ${C.border}`,background:C.s2,animation:"fadeIn .15s ease"}}><div style={{fontSize:30,marginBottom:6}}>🎉</div><div style={{fontSize:16,fontWeight:900}}>掲載完了！</div><div style={{fontSize:12,color:C.t2,marginTop:4}}>全ユーザーに公開されました</div></div>)}

  {loading&&<div style={{textAlign:"center",padding:"40px 0",color:C.t3}}><div style={{display:"inline-block",width:24,height:24,border:`3px solid ${C.b2}`,borderTop:`3px solid ${C.accent}`,borderRadius:"50%",animation:"spin .8s linear infinite"}}/></div>}

  {/* 料金比較 */}
  {showR&&kmN>0&&(<div style={{padding:"10px 16px",animation:"fadeIn .2s ease"}}>
    <div style={{fontSize:13,color:C.accent,fontWeight:800,marginBottom:8}}>📊 {kmN}km 料金ランキング</div>
    {[...fc].sort((a,b)=>(a.base_fare+Math.ceil(kmN)*a.per_km)-(b.base_fare+Math.ceil(kmN)*b.per_km)).map((co,i)=>(
      <div key={co.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
        <span style={{width:22,textAlign:"center",fontSize:i<3?14:12,fontWeight:900,color:i===0?C.gold:i===1?"#C0C0C0":i===2?"#CD7F32":C.t3}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`}</span>
        <div style={{flex:1}}><span style={{fontSize:13,fontWeight:700}}>{co.name}</span></div>
        <span style={{fontSize:18,fontWeight:900,color:C.accent}}>{fmtYen(co.base_fare+Math.ceil(kmN)*co.per_km)}</span>
      </div>))}
  </div>)}

  {/* 業者カード */}
  {!showR&&!loading&&fc.map((co,i)=>(
  <div key={co.id} style={{margin:"8px 16px",background:co.featured?`linear-gradient(135deg,${C.aL},${C.card})`:C.card,borderRadius:16,padding:14,border:`1px solid ${co.featured?C.accent+"44":C.b2}`,animation:`slideUp .15s ease ${i*.02}s both`}}>
    {co.featured&&<span style={{fontSize:10,color:C.accent,fontWeight:700}}>⭐ 公式</span>}
    <div style={{fontWeight:900,fontSize:15}}>{co.name}</div>
    <div style={{fontSize:11,color:C.t2}}>{co.pref} · {co.area} · {co.hours}</div>
    <div style={{fontSize:13,fontWeight:700,color:C.accent,marginTop:2}}>初乗り{fmtYen(co.base_fare)} · 1km{fmtYen(co.per_km)}</div>
    {co.campaign&&<div style={{fontSize:11,color:C.green,fontWeight:700,marginTop:2}}>🎉 {co.campaign}</div>}
    <div style={{display:"flex",gap:6,marginTop:8}}>
      <a href={`tel:${co.phone}`} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"10px 0",background:"linear-gradient(135deg,#00D26A,#00a050)",color:"#fff",borderRadius:12,fontWeight:900,fontSize:13,textDecoration:"none"}}>📞 電話</a>
      {co.line&&<a href={co.line} target="_blank" rel="noopener" style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"10px 0",background:"#06C755",color:"#fff",borderRadius:12,fontWeight:900,fontSize:13,textDecoration:"none"}}>💬 LINE</a>}
    </div>
  </div>))}
</div>);
}

/* ═══ App ═══ */
const NAV=[{id:"battle",icon:"⚔️",label:"バトル"},{id:"company",icon:"🚗",label:"配車"}];
function App(){
  const[screen,setScreen]=useState("battle");
  const scrollRef=useRef(null);
  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=0;},[screen]);
  return(
<div style={{fontFamily:"'Noto Sans JP',sans-serif",background:C.bg,minHeight:"100vh",color:C.text,maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column"}}>
  <div style={{background:C.s1,padding:"8px 16px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
    <div onClick={()=>setScreen("battle")} style={{cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
      <span style={{fontWeight:900,fontSize:18}}>代行</span><span style={{fontWeight:900,fontSize:18,color:C.accent}}>なう</span>
    </div>
    <div style={{fontSize:10,color:C.t2}}>お客 vs 運転手</div>
  </div>
  <div ref={scrollRef} style={{flex:1,overflowY:"auto"}}>
    {screen==="battle"&&<BattleScreen/>}
    {screen==="company"&&<CompanyScreen/>}
  </div>
  <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(6,6,9,.97)",borderTop:`1px solid ${C.border}`,display:"flex",backdropFilter:"blur(16px)",zIndex:100,paddingBottom:"env(safe-area-inset-bottom)"}}>
    {NAV.map(n=>(
      <button key={n.id} onClick={()=>setScreen(n.id)} style={{flex:1,padding:"10px 0 12px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"inherit",color:screen===n.id?C.accent:C.t3}}>
        <span style={{fontSize:20,lineHeight:1}}>{n.icon}</span>
        <span style={{fontSize:9,fontWeight:screen===n.id?700:400}}>{n.label}</span>
        {screen===n.id&&<div style={{width:16,height:2,borderRadius:1,background:C.accent,marginTop:1}}/>}
      </button>))}
  </div>
</div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
