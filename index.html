// ── ユーティリティ ──
const fmtYen = n => `¥${Number(n).toLocaleString()}`;
const rnd = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const ago = ts => {

  return s<60?`${s}秒前`:s<3600?`${Math.floor(s/60)}分前`:s<86400?`${Math.floor(s/3600)}時間前`:`${Math.floor(s/86400)}日前`;
};
const AV_G = ["135deg,#FF6B00,#FF3D00","135deg,#00C853,#00796B","135deg,#2979FF,#1565C0","135deg,#AA00FF,#6200EA","135deg,#FF1744,#B71C1C","135deg,#00B0FF,#0277BD","135deg,#FFD600,#F57F17"];
const avC = n => { let s=0; for(const c of (n||"?")) s += c.charCodeAt(0); return AV_G[s % AV_G.length]; };
const avCh = n => (n||"?")[0].toUpperCase();

/* ══════════════════════════════════════
   料金計算（実際の料金表に合わせて調整）
   ══════════════════════════════════════ */
const FARE_TABLE = [
  {maxKm:2,  base:1500, perKm:400},
  {maxKm:5,  base:2200, perKm:350},
  {maxKm:10, base:3400, perKm:300},
  {maxKm:20, base:5400, perKm:250},
  {maxKm:999,base:8000, perKm:200},
];
const calcFare = km => {
  if(!km || km<=0) return null;
  const h = new Date().getHours(), isLate = h>=23 || h<5;
  const tier = FARE_TABLE.find(t => km<=t.maxKm) || FARE_TABLE[4];
  const fare = Math.ceil((tier.base + Math.max(0,km-1)*tier.perKm) * (isLate?1.3:1) / 100)*100;
  return { fare, isLate, km, min:Math.round(fare*.9), max:Math.round(fare*1.1) };
};
const calcFee = fare => {
  if(!fare) return null;
  const fee = Math.ceil(fare*.1/10)*10;
  return { fare, fee, net:fare-fee };
};

// ── 距離計算（Haversine） ──
const SPOTS = {
  "博多駅":{lat:33.5904,lon:130.4207},"天神":{lat:33.5902,lon:130.3976},
  "福岡空港":{lat:33.5839,lon:130.4511},"中洲":{lat:33.5920,lon:130.4065},
  "大橋":{lat:33.5620,lon:130.4213},"春日市":{lat:33.5317,lon:130.4747},
  "香椎":{lat:33.6275,lon:130.4373},"久留米駅":{lat:33.3196,lon:130.5083},
  "太宰府":{lat:33.5126,lon:130.5302},"姪浜":{lat:33.5815,lon:130.3444},
  "那珂川":{lat:33.5025,lon:130.4180},"大野城":{lat:33.5367,lon:130.4778},
  "二日市":{lat:33.5087,lon:130.5133},"薬院":{lat:33.5813,lon:130.3998},
  "西新":{lat:33.5815,lon:130.3650},"六本松":{lat:33.5760,lon:130.3870},
};
const getKm = (from,to) => {
  const f = Object.entries(SPOTS).find(([k])=>from.includes(k));
  const t = Object.entries(SPOTS).find(([k])=>to.includes(k));
  if(!f||!t) return null;
  const R=6371, dL=(t[1].lat-f[1].lat)*Math.PI/180, dO=(t[1].lon-f[1].lon)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(f[1].lat*Math.PI/180)*Math.cos(t[1].lat*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)) * 1.25; // 道路距離は直線の約1.25倍
};

/* ══════════════════════════════════════
   🗺️ ネオンCanvasマップ
   ══════════════════════════════════════ */
function NeonMap({fromSpot, toSpot}) {
  const cvRef = useRef(null);
  const [tick, setTick] = useState(0);
  const dPos = useRef(DRIVERS.filter(d=>d.active).map((d,i)=>({...d, px:0.15+i*0.18, py:0.2+i*0.14})));
  const pulse = useRef(0);

  useEffect(() => {
    const t = setInterval(() => {
      pulse.current = (pulse.current + 1) % 30;
      dPos.current = dPos.current.map(d => ({...d, px:Math.max(0.06,Math.min(0.90,d.px+(Math.random()-.5)*.018)), py:Math.max(0.06,Math.min(0.88,d.py+(Math.random()-.5)*.018))}));
      setTick(v=>v+1);
    }, 1800);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    const cv = cvRef.current; if(!cv) return;
    const ctx = cv.getContext("2d");
    const W = cv.width, H = cv.height;
    ctx.fillStyle = "#050508"; ctx.fillRect(0,0,W,H);

    // ネオングリッド
    ctx.strokeStyle = "rgba(255,107,0,.06)"; ctx.lineWidth = 0.5;
    for(let x=0;x<W;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // 主要道路
    const roads = [[0,H*.5,W,H*.5],[W*.5,0,W*.5,H],[W*.18,0,W*.18,H],[W*.82,0,W*.82,H],[0,H*.28,W,H*.28],[0,H*.72,W,H*.72]];
    roads.forEach(([x1,y1,x2,y2],i) => {
      ctx.shadowColor = "rgba(255,107,0,.4)"; ctx.shadowBlur = 6;
      ctx.strokeStyle = i<2?"rgba(255,107,0,.35)":"rgba(255,107,0,.18)";
      ctx.lineWidth = i<2?3:1.5;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      ctx.shadowBlur = 0;
    });

    // 地名ラベル
    const areas = [["博多駅",W*.18,H*.5],["天神",W*.5,H*.28],["中洲",W*.5,H*.5],["大橋",W*.5,H*.72],["福岡空港",W*.82,H*.28],["那珂川",W*.82,H*.72]];
    ctx.shadowBlur = 0;
    areas.forEach(([name,x,y]) => {
      ctx.fillStyle = "rgba(255,255,255,.22)";
      ctx.font = "9px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(name, x, y+16);
    });

    // 出発地・目的地
    if(fromSpot && toSpot) {
      const fx = fromSpot.px*W, fy = fromSpot.py*H;
      const tx = toSpot.px*W, ty = toSpot.py*H;
      ctx.shadowColor = C.green; ctx.shadowBlur = 10;
      ctx.strokeStyle = C.green; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur = 0;
      ctx.fillStyle = C.green; ctx.shadowColor = C.green; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(fx,fy,7,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = C.red; ctx.shadowColor = C.red;
      ctx.beginPath(); ctx.arc(tx,ty,7,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // 現在地
    const p = pulse.current / 30;
    ctx.strokeStyle = `rgba(74,144,255,${0.6-p*.5})`; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(W/2,H/2,6+p*8,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle = C.blue; ctx.shadowColor = C.blue; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(W/2,H/2,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.shadowBlur = 0;
    ctx.font = "bold 9px sans-serif"; ctx.textAlign = "center"; ctx.fillText("現在地", W/2, H/2+16);

    // ドライバー
    dPos.current.forEach(d => {
      const x = d.px * W, y = d.py * H;
      ctx.strokeStyle = "rgba(255,107,0,.3)"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(x,y,16,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle = C.accent; ctx.shadowColor = C.accent; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = "#000"; ctx.shadowBlur = 0;
      ctx.font = "bold 8px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(d.short[0], x, y);
      const lw = 50, lh = 17;
      ctx.fillStyle = "rgba(20,20,20,.92)"; ctx.strokeStyle = C.accent; ctx.lineWidth = 1;
      ctx.shadowColor = C.accent; ctx.shadowBlur = 4;
      ctx.beginPath();
      if(ctx.roundRect) ctx.roundRect(x-lw/2, y-32, lw, lh, 4);
      else { ctx.rect(x-lw/2, y-32, lw, lh); }
      ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;
      ctx.fillStyle = C.accent; ctx.font = "bold 8px sans-serif";
      ctx.fillText(`${d.eta}分`, x-7, y-23);
      ctx.fillStyle = C.gold; ctx.fillText(`${fmtYen(d.price)}`, x+8, y-23);
    });
  }, [tick, fromSpot, toSpot]);

  return (
    <div style={{width:"100%", borderRadius:16, overflow:"hidden", border:`1px solid rgba(255,107,0,.25)`, background:"#050508", position:"relative"}}>
      <canvas ref={cvRef} width={360} height={240} style={{width:"100%", height:240, display:"block"}}/>
      <div style={{position:"absolute", bottom:0, left:0, right:0, padding:"6px 10px", background:"rgba(5,5,8,.85)", display:"flex", gap:10, fontSize:10}}>
        <span style={{color:C.blue}}>● 現在地</span>
        <span style={{color:C.accent}}>● ドライバー</span>
        {fromSpot && <span style={{color:C.green}}>● 出発</span>}
        {toSpot && <span style={{color:C.red}}>● 目的地</span>}
        <span style={{marginLeft:"auto", color:C.green}}>{DRIVERS.filter(d=>d.active).length}台稼働中</span>
      </div>
    </div>
  );
}

const MAP_SPOTS = {
  "博多駅":{px:0.18,py:0.50},"天神":{px:0.50,py:0.28},"中洲":{px:0.50,py:0.50},
  "大橋":{px:0.50,py:0.72},"福岡空港":{px:0.82,py:0.28},"春日市":{px:0.82,py:0.72},
  "香椎":{px:0.82,py:0.28},"久留米駅":{px:0.15,py:0.82},"姪浜":{px:0.15,py:0.28},
  "太宰府":{px:0.68,py:0.82},"那珂川":{px:0.82,py:0.72},"大野城":{px:0.68,py:0.65},
  "薬院":{px:0.42,py:0.38},"西新":{px:0.30,py:0.28},"六本松":{px:0.38,py:0.42},
};
const findSpot = q => {
  if(!q) return null;
  const key = Object.keys(MAP_SPOTS).find(k => q.includes(k));
  return key ? MAP_SPOTS[key] : null;
};

/* ══════════════════════════════════════
   🗺️ 料金計算＆マップ画面
   ══════════════════════════════════════ */
function FareScreen() {
  const [from, setFrom] = useState("");
  const [to, setTo] = useState("");
  const [result, setResult] = useState(null);
  const [searching, setSearching] = useState(false);
  const fromSpot = findSpot(from);
  const toSpot = findSpot(to);

  const doSearch = () => {
    if(!from.trim()||!to.trim()) return;
    setSearching(true);
    setTimeout(() => {
      const km = getKm(from, to) || (Math.random()*8+1);
      const fare = calcFare(km);
      const fee = calcFee(fare?.fare||0);
      setResult({km, fare, fee, minutes: Math.round(km/30*60+rnd(2,8))});

                  {t.liked?"❤️":"🤍"}{t.likes > 0 && <span>{t.likes}</span>}
                </button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

const NAV = [
  {id:"fare",  icon:"📏", label:"料金計算"},
  {id:"order", icon:"🚗", label:"代行予約"},
  {id:"board", icon:"📢", label:"掲示板"},
  {id:"info",  icon:"ℹ️", label:"案内"},
];

/* ══════════════════════════════════════
   メインApp
   ══════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState("fare");
  const [posts, setPosts] = useState(INIT_POSTS);
  const [tlPosts, setTlPosts] = useState(INIT_TL);
  const [toastMsg, setToastMsg] = useState(null);
  const toastTimer = useRef(null);
  const scrollRef = useRef(null);

  const onlineCount = DRIVERS.filter(d=>d.active).length;

  useEffect(() => { if(scrollRef.current) scrollRef.current.scrollTop = 0; }, [screen]);

  const showToast = useCallback(msg => {
    setToastMsg(msg); clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(null), 2800);
  }, []);

  const handleLike = useCallback(id => setPosts(p => p.map(x => x.id===id ? {...x, liked:!x.liked, likes:x.liked?x.likes-1:x.likes+1} : x)), []);
  const handleTlLike = useCallback(id => setTlPosts(p => p.map(x => x.id===id ? {...x, liked:!x.liked, likes:x.liked?x.likes-1:x.likes+1} : x)), []);

  return (
    <div style={{fontFamily:"'Noto Sans JP',sans-serif", background:C.bg, minHeight:"100vh", color:C.text, maxWidth:480, margin:"0 auto", display:"flex", flexDirection:"column"}}>

      {/* Toast */}
      {toastMsg && <div style={{position:"fixed", bottom:88, left:"50%", transform:"translateX(-50%)", background:"#1e1e1e", color:C.text, padding:"10px 20px", borderRadius:20, fontSize:13, fontWeight:700, zIndex:8000, border:`1px solid ${C.b3}`, whiteSpace:"nowrap", animation:"fadeIn .25s ease"}}>{toastMsg}</div>}

      {/* トップバー */}
      <div style={{background:C.s1, padding:"12px 16px 10px", borderBottom:`1px solid ${C.border}`, position:"sticky", top:0, zIndex:50}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
          <div style={{display:"flex", alignItems:"center", gap:8}}>
            <span style={{fontWeight:900, fontSize:20, color:C.text, letterSpacing:"-.5px"}}>代行</span>
            <span style={{fontWeight:900, fontSize:20, color:C.accent, letterSpacing:"-.5px"}}>なう</span>
            <span style={{fontSize:10, color:C.green, fontWeight:700, display:"flex", alignItems:"center", gap:4, background:C.gL, padding:"3px 8px", borderRadius:10, border:`1px solid ${C.green}22`}}>
              <span style={{width:5, height:5, borderRadius:"50%", background:C.green, display:"inline-block", animation:"blink 1.4s ease-in-out infinite"}}/>{onlineCount}台稼働
            </span>
          </div>
          <a href={`tel:${BIZ.phone}`} style={{display:"flex", alignItems:"center", gap:5, padding:"7px 14px", background:"linear-gradient(135deg,#00D26A,#00a050)", color:"#fff", borderRadius:12, fontWeight:800, fontSize:12, textDecoration:"none"}}>
            📞 電話
          </a>
        </div>
      </div>

      {/* コンテンツ */}
      <div ref={scrollRef} style={{flex:1, overflowY:"auto", paddingBottom:0}}>
        {screen === "fare" && <FareScreen/>}
        {screen === "order" && <OrderScreen showToast={showToast}/>}
        {screen === "board" && <BoardScreen posts={posts} tlPosts={tlPosts} onLike={handleLike} onTlLike={handleTlLike}/>}
        {screen === "info" && <InfoScreen/>}
      </div>

      {/* ボトムナビ */}
      <div style={{position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:"rgba(8,8,8,.97)", borderTop:`1px solid ${C.border}`, display:"flex", backdropFilter:"blur(16px)", zIndex:100, paddingBottom:"env(safe-area-inset-bottom)"}}>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setScreen(n.id)} style={{flex:1, padding:"10px 0 12px", background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, fontFamily:"inherit", color:screen===n.id?C.accent:C.t3, transition:"color .15s"}}>
            <span style={{fontSize:18, lineHeight:1}}>{n.icon}</span>
            <span style={{fontSize:9, fontWeight:screen===n.id?700:400, letterSpacing:.3}}>{n.label}</span>
            {screen===n.id && <div style={{width:18, height:2, borderRadius:1, background:C.accent, marginTop:1}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
