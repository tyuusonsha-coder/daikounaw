<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="robots" content="noindex,nofollow"/>
<meta name="theme-color" content="#060609"/>
<title>お知らせ管理｜代行なう</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060609;color:#efefef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;padding:16px;min-height:100vh}
h1{font-size:18px;font-weight:900;margin-bottom:14px}
h1 span{color:#00e5ff}
textarea,input{width:100%;background:#0c0c10;border:1px solid #33333e;border-radius:12px;color:#efefef;padding:12px;font-size:15px;font-family:inherit;-webkit-appearance:none}
textarea{min-height:110px;line-height:1.6;resize:vertical}
.btn{display:block;width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;margin-top:10px}
.btn-post{background:linear-gradient(135deg,#00e5ff,#1aa7c4);color:#041018}
.tpl{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.tpl button{flex:1;min-width:30%;padding:9px 4px;background:#0c0c10;border:1px solid rgba(0,229,255,.35);border-radius:10px;color:#00e5ff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.item{background:#0c0c10;border:1px solid #24242e;border-radius:14px;padding:12px 14px;margin-top:10px}
.item .dt{font-size:11px;color:#888;font-weight:700}
.item .bd{font-size:13px;color:#ddd;line-height:1.6;margin-top:3px;white-space:pre-wrap}
.item .del{margin-top:8px;padding:6px 14px;background:none;border:1px solid #ff5c5c;border-radius:8px;color:#ff5c5c;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.pinrow{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.pinrow input{flex:1}
.msg{font-size:13px;font-weight:700;margin-top:10px;text-align:center}
.ok{color:#3ddc84}.ng{color:#ff5c5c}
.sec{font-size:12px;color:#888;font-weight:800;margin:22px 0 4px}
</style>
</head><body>
<div id="app">
<h1>📢 お知らせ<span>管理</span></h1>
<div class="pinrow"><input type="tel" id="pin" placeholder="PIN（4桁）" maxlength="8"></div>
<div class="tpl">
<button onclick="tpl(0)">本日営業</button>
<button onclick="tpl(1)">空車あり</button>
<button onclick="tpl(2)">定休日</button>
</div>
<textarea id="body" placeholder="お知らせ本文を入力…"></textarea>
<button class="btn btn-post" onclick="post()">投稿する</button>
<div id="msg" class="msg"></div>
<div class="sec">投稿済みのお知らせ（タップで削除可）</div>
<div id="list"></div>
</div>
<script>
var SB="https://kjfmcpwstubgezebmstt.supabase.co/rest/v1/";
var SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZm1jcHdzdHViZ2V6ZWJtc3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODU3MTksImV4cCI6MjA5NDE2MTcxOX0.GF5QPVI4AUCfIqdmApplwOAEDBoESZTfadi-hbOb7Gs";
var H={"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json"};
function h(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtDate(ts){var d=new Date(Number(ts));return d.getFullYear()+"/"+("0"+(d.getMonth()+1)).slice(-2)+"/"+("0"+d.getDate()).slice(-2)}
function today(){var d=new Date();return (d.getMonth()+1)+"月"+d.getDate()+"日"}
var TPLS=[
"本日"+today()+"、通常営業しております（21:00〜翌6:00）。\n福岡市・那珂川市・春日市・大野城市・太宰府市エリア対応、1kmごとに400円のみ。高速料金は無料です。\nご依頼はお電話・LINEでどうぞ！",
"ただいま空車ございます！最短10分でお迎えに上がります。\n「今いる場所」と「帰り先」をお伝えください。すぐ概算をお出しします。",
"本日"+today()+"は定休日をいただいております。\n明日21時より通常営業いたします。ご依頼お待ちしております。"
];
function tpl(i){document.getElementById("body").value=TPLS[i];}
function msg(t,ok){var m=document.getElementById("msg");m.textContent=t;m.className="msg "+(ok?"ok":"ng");}
try{var sp=localStorage.getItem("dn_pin");if(sp)document.getElementById("pin").value=sp;}catch(e){}
async function post(){
var pin=document.getElementById("pin").value.trim();
var body=document.getElementById("body").value.trim();
if(!pin){msg("PINを入力してください",false);return;}
if(!body){msg("本文を入力してください",false);return;}
try{
var r=await fetch(SB+"rpc/post_news",{method:"POST",headers:H,body:JSON.stringify({pin:pin,body:body})});
if(r.ok){
try{localStorage.setItem("dn_pin",pin)}catch(e){}
document.getElementById("body").value="";
msg("投稿しました！サイトに反映されています。",true);
load();
}else{
var e=await r.json();
msg(e.message&&e.message.indexOf("PIN")>=0?"PINが違います":"投稿に失敗しました",false);
}
}catch(e){msg("通信エラー。電波を確認してもう一度。",false);}
}
async function del(id){
if(!confirm("このお知らせを削除しますか？"))return;
var pin=document.getElementById("pin").value.trim();
try{
var r=await fetch(SB+"rpc/delete_news",{method:"POST",headers:H,body:JSON.stringify({pin:pin,news_id:id})});
if(r.ok){msg("削除しました",true);load();}
else msg("削除に失敗しました（PIN確認）",false);
}catch(e){msg("通信エラー",false);}
}
async function load(){
try{
var r=await fetch(SB+"news?order=created_at.desc&limit=20",{headers:H});
var arr=await r.json();
if(!Array.isArray(arr))arr=[];
var o="";
arr.forEach(function(n){
o+='<div class="item"><div class="dt">'+fmtDate(n.created_at)+'</div><div class="bd">'+h(n.body)+'</div><button class="del" onclick="del(\''+n.id+'\')">削除</button></div>';
});
document.getElementById("list").innerHTML=o||'<div class="item" style="color:#888;font-size:13px">まだお知らせはありません</div>';
}catch(e){}
}
load();
</script>
</body></html>
