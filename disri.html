<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DISRI CLUB｜代行なう</title>
<style>
  :root{--bg:#060912;--bg2:#0d1526;--line:#1c2942;--cyan:#00ffe0;--blue:#00a7ff;--txt:#eaf2ff;--sub:#8ea0be;--red:#ff3b5c;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    background:radial-gradient(120% 60% at 50% 0%,rgba(0,255,224,.10),transparent 55%),radial-gradient(90% 50% at 50% 100%,rgba(0,120,255,.10),transparent 60%),var(--bg);
    color:var(--txt);min-height:100vh;overflow-x:hidden}
  .top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
  .top .logo{font-size:16px;font-weight:900;display:flex;align-items:center;gap:6px}
  .back{text-decoration:none;font-size:13px;font-weight:800;color:#fff;padding:9px 15px;background:rgba(0,255,224,.15);border:1px solid var(--cyan);border-radius:999px;white-space:nowrap}
  .join{max-width:480px;margin:0 auto;padding:26px 22px 50px;text-align:center}
  .neon{font-size:40px;font-weight:900;letter-spacing:1px;margin:10px 0 4px;color:#d7fff9;
    text-shadow:0 0 6px #00ffe0,0 0 14px #00ffe0,0 0 30px #00b7a8,0 0 50px #007d76;animation:flick 3.5s infinite}
  @keyframes flick{0%,100%{opacity:1}48%{opacity:1}49%{opacity:.75}50%{opacity:1}92%{opacity:1}93%{opacity:.7}94%{opacity:1}}
  .mic{font-size:96px;line-height:1;margin:6px 0 10px;
    filter:drop-shadow(0 0 12px rgba(0,255,224,.7)) drop-shadow(0 0 30px rgba(0,167,255,.4))}
  .title{font-size:30px;font-weight:900;margin:2px 0 12px;text-shadow:0 0 20px rgba(0,255,224,.25)}
  .lead{font-size:14px;color:var(--sub);margin-bottom:28px;line-height:1.8}
  .field-label{display:block;text-align:left;font-size:13px;font-weight:800;color:var(--cyan);margin-bottom:8px}
  .join input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:15px 16px;color:var(--txt);font-size:16px;outline:none;font-family:inherit;margin-bottom:20px}
  .join input:focus{border-color:var(--cyan)}
  .enter{width:100%;background:linear-gradient(135deg,#00ffe0,#00a7ff);color:#041018;border:none;border-radius:14px;padding:18px;font-size:18px;font-weight:900;cursor:pointer;
    box-shadow:0 0 0 1px rgba(0,255,224,.6),0 10px 34px rgba(0,255,224,.30);display:flex;align-items:center;justify-content:center;gap:8px}
  .enter:active{transform:scale(.98)}
  .note{font-size:12.5px;color:var(--sub);background:rgba(0,167,255,.06);border:1px solid rgba(0,167,255,.22);border-radius:12px;padding:13px 15px;margin-top:24px;line-height:1.8;text-align:left}
  #room{position:fixed;inset:0;top:56px;display:none}
  #jitsi{width:100%;height:100%}
  .leave{position:fixed;top:10px;right:16px;z-index:10;background:var(--red);color:#fff;border:none;border-radius:999px;padding:10px 18px;font-size:14px;font-weight:800;cursor:pointer}
  .loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:16px}
  .spin{width:44px;height:44px;border:4px solid var(--line);border-top-color:var(--cyan);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loading p{font-size:14px;color:var(--sub)}
</style>
</head>
<body>
<div class="top">
  <div class="logo">🎙 DISRI CLUB</div>
  <a href="index.html" class="back">← 代行なう</a>
</div>
<div class="join" id="joinView">
  <div class="neon">#代行なう</div>
  <div class="mic">🎙️</div>
  <div class="title">深夜のたまり場ルーム</div>
  <div class="lead">名前を入れて「入室」を押すと、<br>いま入っている人と<br>リアルタイムで声で話せます。</div>
  <label class="field-label">表示名</label>
  <input id="name" placeholder="名前を入れてください" maxlength="16">
  <button class="enter" onclick="joinRoom()">🎙️ 入室する</button>
  <div class="note">🔊 マイクの使用を求められたら「許可」を押してください。静かな場所でのご利用がおすすめです。退室はルーム内の赤い受話器ボタンから。</div>
</div>
<div id="room">
  <button class="leave" onclick="leaveRoom()">✕ 退室</button>
  <div id="jitsi"></div>
  <div class="loading" id="loading"><div class="spin"></div><p>接続しています…</p></div>
</div>
<script src="https://meet.jit.si/external_api.js"></script>
<script>
var api=null, joined=false;
function myName(){var v=document.getElementById("name").value.trim();return v||"ゲスト"+Math.floor(Math.random()*1000);}
function joinRoom(){
  var name=myName();
  try{ localStorage.setItem("disri_name",name); }catch(e){}
  document.getElementById("joinView").style.display="none";
  document.getElementById("room").style.display="block";
  document.getElementById("loading").style.display="flex";
  startJitsi(name);
}
function startJitsi(name){
  var options={
    roomName:"DISRI_CLUB_daikounaw_main",width:"100%",height:"100%",
    parentNode:document.getElementById("jitsi"),userInfo:{displayName:name},
    configOverwrite:{startWithVideoMuted:true,startAudioOnly:true,prejoinPageEnabled:false,prejoinConfig:{enabled:false},disableDeepLinking:true},
    interfaceConfigOverwrite:{MOBILE_APP_PROMO:false,SHOW_JITSI_WATERMARK:false,SHOW_WATERMARK_FOR_GUESTS:false,TOOLBAR_BUTTONS:['microphone','hangup','tileview','raisehand','settings']}
  };
  try{
    api=new JitsiMeetExternalAPI("meet.jit.si",options);
    joined=true;
    api.addEventListener("videoConferenceJoined",function(){hideLoading();});
    api.addEventListener("videoConferenceLeft",function(){if(joined){setTimeout(function(){reconnect(name);},1500);}});
    api.addEventListener("readyToClose",function(){leaveRoom();});
  }catch(e){hideLoading();alert("接続に失敗しました。もう一度お試しください。");}
  setTimeout(hideLoading,5000);
}
function reconnect(name){
  if(!joined)return;
  try{ if(api) api.dispose(); }catch(e){}
  document.getElementById("jitsi").innerHTML="";
  document.getElementById("loading").style.display="flex";
  startJitsi(name);
}
function hideLoading(){var l=document.getElementById("loading");if(l)l.style.display="none";}
function leaveRoom(){
  joined=false;
  try{ if(api){api.dispose();api=null;} }catch(e){}
  document.getElementById("jitsi").innerHTML="";
  document.getElementById("room").style.display="none";
  document.getElementById("joinView").style.display="block";
}
try{var saved=localStorage.getItem("disri_name");if(saved)document.getElementById("name").value=saved;}catch(e){}
</script>
</body>
</html>
