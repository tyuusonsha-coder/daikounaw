
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>DISRI CLUB</title>
<style>
:root{ --bg:#04060c; --c1:#00ffe0; --magenta:#ff1a9d; --violet:#b44fff; --c2:#ff1a5e; --tx:#e6f0fb; --tx2:rgba(210,228,245,.7); --tx3:rgba(180,200,220,.45); --line:#142231; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:var(--tx)}
.bg-road{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 90% 50% at 50% 0%,rgba(80,0,80,.25),transparent 60%),radial-gradient(ellipse 80% 40% at 50% 110%,rgba(0,80,90,.18),transparent 70%),linear-gradient(180deg,#04060c,#060818 50%,#030610)}
.shell{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column}
.topbar{height:54px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;background:linear-gradient(180deg,rgba(4,6,12,.97),rgba(4,6,12,.4));border-bottom:1px solid var(--line)}
.logo{font-size:18px;font-weight:900;letter-spacing:.18em;background:linear-gradient(90deg,var(--c1),var(--violet),var(--magenta),var(--c1));background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:logo-shift 6s linear infinite}
@keyframes logo-shift{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.logo-dot{-webkit-text-fill-color:var(--magenta);color:var(--magenta)}
.top-sep{flex:1}
.back{text-decoration:none;font-size:11px;color:var(--tx2);padding:5px 9px;border:1px solid var(--line);border-radius:7px;white-space:nowrap}
.pill{display:flex;align-items:center;gap:6px;font-size:12px;letter-spacing:.06em;padding:5px 11px;border:1px solid var(--c1);border-radius:5px;color:var(--c1);background:rgba(0,255,224,.08)}
.pill::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--c1);box-shadow:0 0 8px var(--c1);animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.content{flex:1;position:relative;overflow:hidden}

.join{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center;gap:14px;overflow-y:auto}
.icon{font-size:58px;filter:drop-shadow(0 0 16px rgba(0,255,224,.5))}
.join h1{font-size:25px;font-weight:900;color:#fff;letter-spacing:.03em}
.join .desc{font-size:14px;color:var(--tx2);line-height:1.7;max-width:340px}
.namebox{width:100%;max-width:340px;text-align:left;margin-top:4px}
.lbl{font-size:13px;color:var(--c1);font-weight:bold;margin-bottom:6px;letter-spacing:.05em}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:14px;color:#fff;font-family:inherit;font-size:17px;outline:none;-webkit-text-fill-color:#fff;caret-color:var(--c1)}
.inp:focus{border-color:rgba(0,255,224,.5)}
.inp::placeholder{color:rgba(255,255,255,.3)}
.join-btn{width:100%;max-width:340px;padding:16px;border:1px solid var(--c1);border-radius:12px;background:rgba(0,255,224,.12);color:var(--c1);font-family:inherit;font-size:17px;font-weight:900;letter-spacing:.08em;cursor:pointer}
.join-btn:active{transform:scale(.98)}
.note{font-size:12px;color:var(--tx3);max-width:340px;line-height:1.65}

#callWrap{position:absolute;inset:0;display:none;background:#04060c}
#callWrap.show{display:block}
#jitsi{width:100%;height:100%}
#jitsi iframe{width:100%;height:100%;border:0}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--c1);font-size:15px;letter-spacing:.08em;text-align:center;padding:24px}
</style>
</head>
<body>
<div class="bg-road"></div>
<div class="shell">
  <div class="topbar">
    <div class="logo">DISRI<span class="logo-dot">.</span>CLUB</div>
    <div class="top-sep"></div>
    <a href="index.html" class="back">← 代行なう</a>
    <div class="pill">通話ルーム</div>
  </div>
  <div class="content">
    <div class="join" id="joinScreen">
      <div class="icon">🎙</div>
      <h1>深夜のたまり場ルーム</h1>
      <div class="desc">名前を入れて「入室」を押すと、いま入っている人とリアルタイムで声で話せます。</div>
      <div class="namebox">
        <div class="lbl">表示名</div>
        <input class="inp" id="nameInp" maxlength="16" placeholder="なまえ">
      </div>
      <button class="join-btn" onclick="joinRoom()">🎙 入室する</button>
      <div class="note">※ マイクの使用を求められたら「許可」を押してください。静かな場所でのご利用がおすすめです。退室はルーム内の赤い受話器ボタンから。</div>
    </div>
    <div id="callWrap">
      <div class="loading" id="loading">つないでいます…</div>
      <div id="jitsi"></div>
    </div>
  </div>
</div>
<script src="https://meet.jit.si/external_api.js"></script>
<script>
var ROOM = "DisriClubFukuokaShinyaRoom7x3k9";
var api = null;

function loadName(){
  try{ var n=localStorage.getItem('disri_name'); if(n) document.getElementById('nameInp').value=n; }catch(e){}
}

function joinRoom(){
  var name = document.getElementById('nameInp').value.trim() || ('ゲスト'+Math.floor(Math.random()*1000));
  try{ localStorage.setItem('disri_name', name); }catch(e){}
  document.getElementById('joinScreen').style.display='none';
  document.getElementById('callWrap').classList.add('show');

  if(typeof JitsiMeetExternalAPI === 'undefined'){
    document.getElementById('loading').textContent='通話ライブラリを読み込めませんでした。通信環境を確認して、ページを再読み込みしてください。';
    return;
  }

  var options = {
    roomName: ROOM,
    parentNode: document.getElementById('jitsi'),
    userInfo: { displayName: name },
    configOverwrite: {
      startWithVideoMuted: true,
      startAudioOnly: true,
      prejoinPageEnabled: false,
      prejoinConfig: { enabled: false },
      disableDeepLinking: true,
      defaultLanguage: 'ja'
    },
    interfaceConfigOverwrite: {
      MOBILE_APP_PROMO: false,
      SHOW_JITSI_WATERMARK: false,
      SHOW_WATERMARK_FOR_GUESTS: false,
      DISABLE_DEEP_LINKING: true
    }
  };

  try{
    api = new JitsiMeetExternalAPI("meet.jit.si", options);
    api.addListener('videoConferenceJoined', function(){
      var l=document.getElementById('loading'); if(l) l.style.display='none';
    });
    api.addListener('readyToClose', function(){ leaveRoom(); });
    setTimeout(function(){ var l=document.getElementById('loading'); if(l) l.style.display='none'; }, 5000);
  }catch(e){
    document.getElementById('loading').textContent='ルームに接続できませんでした。少し待って再度お試しください。';
  }
}

function leaveRoom(){
  if(api){ try{ api.dispose(); }catch(e){} api=null; }
  document.getElementById('jitsi').innerHTML='';
  document.getElementById('callWrap').classList.remove('show');
  var l=document.getElementById('loading'); if(l){ l.style.display='flex'; l.textContent='つないでいます…'; }
  document.getElementById('joinScreen').style.display='flex';
}

loadName();
</script>
</body>
</html>
