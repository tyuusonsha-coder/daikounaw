<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>無線 | 代行なう</title>
<style>
:root{
  --bg:#04060c; --c1:#00ffe0; --magenta:#ff1a9d; --violet:#b44fff;
  --red:#ff2547; --tx:#e6f0fb; --tx2:rgba(210,228,245,.7); --tx3:rgba(180,200,220,.45); --line:#142231;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:var(--tx);-webkit-tap-highlight-color:transparent}
.bg-road{position:fixed;inset:0;z-index:1;background:
  radial-gradient(ellipse 90% 50% at 50% 0%,rgba(0,90,90,.22),transparent 60%),
  radial-gradient(ellipse 80% 40% at 50% 110%,rgba(80,0,60,.18),transparent 70%),
  linear-gradient(180deg,#04060c,#060818 50%,#030610)}
.shell{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column}

.topbar{height:54px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;background:linear-gradient(180deg,rgba(4,6,12,.97),rgba(4,6,12,.4));border-bottom:1px solid var(--line)}
.logo{font-size:18px;font-weight:900;letter-spacing:.28em;background:linear-gradient(90deg,var(--c1),var(--violet),var(--magenta),var(--c1));background-size:300% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;animation:logo-shift 6s linear infinite}
@keyframes logo-shift{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.top-sep{flex:1}
.back{text-decoration:none;font-size:11px;color:var(--tx2);padding:5px 9px;border:1px solid var(--line);border-radius:7px;white-space:nowrap}
.pill{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.06em;padding:5px 10px;border:1px solid var(--line);border-radius:5px;color:var(--tx3)}
.pill.live{border-color:var(--c1);color:var(--c1);background:rgba(0,255,224,.08)}
.pill.live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--c1);box-shadow:0 0 8px var(--c1);animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}

.content{flex:1;position:relative;overflow:hidden}

/* 入室前 */
.join{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center;gap:14px;overflow-y:auto}
.icon{font-size:58px;filter:drop-shadow(0 0 16px rgba(0,255,224,.5))}
.join h1{font-size:25px;font-weight:900;color:#fff;letter-spacing:.04em}
.join .desc{font-size:14px;color:var(--tx2);line-height:1.7;max-width:340px}
.namebox{width:100%;max-width:340px;text-align:left;margin-top:4px}
.lbl{font-size:13px;color:var(--c1);font-weight:bold;margin-bottom:6px;letter-spacing:.05em}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:14px;color:#fff;font-family:inherit;font-size:17px;outline:none;-webkit-text-fill-color:#fff;caret-color:var(--c1)}
.inp:focus{border-color:rgba(0,255,224,.5)}
.inp::placeholder{color:rgba(255,255,255,.3)}
.join-btn{width:100%;max-width:340px;padding:16px;border:1px solid var(--c1);border-radius:12px;background:rgba(0,255,224,.12);color:var(--c1);font-family:inherit;font-size:17px;font-weight:900;letter-spacing:.1em;cursor:pointer}
.join-btn:active{transform:scale(.98)}
.note{font-size:12px;color:var(--tx3);max-width:340px;line-height:1.65}

/* 無線UI */
.radio{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;padding:18px;text-align:center}
.radio.show{display:flex}
.status{margin-top:6px;font-size:12px;letter-spacing:.1em;color:var(--tx2)}
.freq{font-size:13px;color:var(--c1);letter-spacing:.16em;margin-top:2px}
.ptt-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;width:100%}
.ptt{
  position:relative;width:208px;height:208px;border-radius:50%;
  border:2px solid var(--c1);background:radial-gradient(circle at 50% 38%,rgba(0,255,224,.18),rgba(0,255,224,.04) 60%,transparent);
  color:var(--c1);font-family:inherit;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 0 30px rgba(0,255,224,.18),inset 0 0 26px rgba(0,255,224,.1);
  transition:transform .06s;user-select:none;touch-action:none;
}
.ptt .ico{font-size:46px;line-height:1}
.ptt .txt{font-size:16px;font-weight:900;letter-spacing:.12em}
.ptt:active{transform:scale(.97)}
.ptt.tx{
  border-color:var(--red);color:#fff;
  background:radial-gradient(circle at 50% 38%,rgba(255,37,71,.4),rgba(255,37,71,.1) 60%,transparent);
  box-shadow:0 0 50px rgba(255,37,71,.55),inset 0 0 30px rgba(255,37,71,.25);
}
.ptt.tx .ico,.ptt.tx .txt{color:#fff}
.ring{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--red);opacity:0;pointer-events:none}
.ptt.tx .ring{animation:ring 1.1s ease-out infinite}
@keyframes ring{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.35);opacity:0}}
.ptt:disabled{opacity:.4;filter:grayscale(.5);cursor:wait;border-color:var(--line);color:var(--tx3);box-shadow:none}

.hint{font-size:13px;color:var(--tx2);line-height:1.6;max-width:300px}
.hint b{color:var(--c1)}
.leave{margin-bottom:8px;padding:12px 26px;border:1px solid var(--red);border-radius:30px;background:rgba(255,37,71,.08);color:var(--red);font-family:inherit;font-size:14px;font-weight:800;letter-spacing:.06em;cursor:pointer}

/* Jitsiは音声エンジンとして裏で動かす（画面外） */
#engine{position:fixed;inset:0;width:100%;height:100%;z-index:0;opacity:1;pointer-events:none;border:0}
</style>
</head>
<body>
<div class="bg-road"></div>
<div class="shell">
  <div class="topbar">
    <div class="logo">無線</div>
    <div class="top-sep"></div>
    <a href="index.html" class="back">← 代行なう</a>
    <div class="pill" id="livePill">待機中</div>
  </div>

  <div class="content">
    <!-- 入室前 -->
    <div class="join" id="joinScreen">
      <div class="icon">📻</div>
      <h1>深夜の無線</h1>
      <div class="desc" id="joinDesc">名前を入れて「無線をひらく」を押すと、相手1人と<b style="color:var(--c1)">1対1</b>でつながります。押している間だけ声が送られます。</div>
      <div class="namebox">
        <div class="lbl">コールサイン（表示名）</div>
        <input class="inp" id="nameInp" maxlength="16" placeholder="なまえ">
      </div>
      <button class="join-btn" onclick="openRadio()">📻 無線をひらく</button>
      <div class="note">※ マイクの使用を求められたら「許可」を押してください。トランシーバーと同じで、ボタンを押している間だけ相手に声が届きます。</div>
    </div>

    <!-- 無線UI -->
    <div class="radio" id="radioScreen">
      <div class="status" id="statusTxt">接続中…</div>
      <div class="freq" id="freqTxt">ダイレクト無線</div>
      <div class="ptt-area">
        <button class="ptt" id="pttBtn" disabled>
          <span class="ring"></span>
          <span class="ico">🎙</span>
          <span class="txt">接続中</span>
        </button>
        <div class="hint" id="hintTxt">つないでいます。少しお待ちください。</div>
      </div>
      <button class="leave" onclick="leaveRadio()">無線を切る</button>
    </div>
  </div>
</div>

<div id="engine"></div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
"use strict";
var ROOM = "DaikonowMusenFukuokaShinya7x3k9"; // 全員が同じ部屋に集まる
var api = null;
var actualMuted = true;   // Jitsi側の実際のミュート状態
var sending = false;      // PTT送信中フラグ
var joined = false;

/* 名前の保存 */
function loadName(){
  try{ var n=localStorage.getItem('disri_name'); if(n) document.getElementById('nameInp').value=n; }catch(e){}
}
loadName();

/* ビープ音（無線っぽさ） */
var actx=null;
function beep(freq,dur){
  try{
    if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
    var o=actx.createOscillator(), g=actx.createGain();
    o.type='square'; o.frequency.value=freq;
    g.gain.setValueAtTime(.0001,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.18,actx.currentTime+.01);
    g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime+dur);
  }catch(e){}
}

function openRadio(){
  var name = document.getElementById('nameInp').value.trim() || ('ゲスト'+Math.floor(Math.random()*1000));
  try{ localStorage.setItem('disri_name', name); }catch(e){}

  document.getElementById('joinDesc').innerHTML='名前を入れて「無線をひらく」を押すと、相手1人と<b style="color:var(--c1)">1対1</b>でつながります。押している間だけ声が送られます。';
  document.getElementById('joinScreen').style.display='none';
  document.getElementById('radioScreen').classList.add('show');

  if(typeof JitsiMeetExternalAPI === 'undefined'){
    document.getElementById('statusTxt').textContent='接続できません';
    document.getElementById('hintTxt').textContent='通信環境を確認して、ページを再読み込みしてください。';
    return;
  }

  var options = {
    roomName: ROOM,
    parentNode: document.getElementById('engine'),
    userInfo: { displayName: name },
    configOverwrite: {
      startWithVideoMuted: true,
      startWithAudioMuted: true,   // 最初は受信のみ（送信OFF）
      startAudioOnly: true,
      prejoinPageEnabled: false,
      prejoinConfig: { enabled: false },
      disableDeepLinking: true,
      defaultLanguage: 'ja'
    },
    interfaceConfigOverwrite: {
      MOBILE_APP_PROMO: false,
      SHOW_JITSI_WATERMARK: false,
      SHOW_WATERMARK_FOR_GUESTS: false,
      DISABLE_DEEP_LINKING: true
    }
  };

  try{
    api = new JitsiMeetExternalAPI("meet.jit.si", options);

    // iPhone対策：通話エンジンに音声の自動再生を許可
    try{
      var ifr = api.getIFrame ? api.getIFrame() : document.querySelector('#engine iframe');
      if(ifr){ ifr.setAttribute('allow','microphone; autoplay; camera; display-capture; speaker-selection'); }
    }catch(e){}
    try{ if(actx && actx.state==='suspended') actx.resume(); }catch(e){}

    api.addEventListener('videoConferenceJoined', function(){
      joined = true;
      setReady();
      updatePeople();
    });
    api.addEventListener('audioMuteStatusChanged', function(e){
      actualMuted = !!e.muted;
    });
    api.addEventListener('participantJoined', updatePeople);
    api.addEventListener('participantLeft', updatePeople);
    api.addEventListener('readyToClose', leaveRadio);

    // 保険：5秒で準備完了表示
    setTimeout(function(){ if(!joined){ joined=true; setReady(); } }, 5000);
  }catch(e){
    document.getElementById('statusTxt').textContent='接続できません';
    document.getElementById('hintTxt').textContent='少し待って、もう一度お試しください。';
  }
}

function setReady(){
  document.getElementById('statusTxt').textContent='受信中';
  document.getElementById('livePill').textContent='ON AIR';
  document.getElementById('livePill').classList.add('live');
  var b=document.getElementById('pttBtn');
  b.disabled=false;
  b.querySelector('.txt').textContent='押して話す';
  document.getElementById('hintTxt').innerHTML='ボタンを<b>押している間だけ</b>声が届きます。<br>離すと相手の声が聞こえます。';
}

function updatePeople(){
  if(!api) return;
  var n;
  try{ n = api.getNumberOfParticipants(); }catch(e){ return; }
  // 1対1のみ：自分を含めて2人まで。3人以上なら満室として退出
  if(n > 2){ roomFull(); return; }
  var f=document.getElementById('freqTxt');
  if(n >= 2){ f.textContent='相手とつながりました'; }
  else { f.textContent='相手を待っています…'; }
}

function roomFull(){
  if(api){ try{ api.dispose(); }catch(e){} api=null; }
  joined=false; sending=false; actualMuted=true;
  document.getElementById('engine').innerHTML='';
  document.getElementById('radioScreen').classList.remove('show');
  document.getElementById('livePill').textContent='満室';
  document.getElementById('livePill').classList.remove('live');
  var js=document.getElementById('joinScreen');
  js.style.display='flex';
  document.getElementById('joinDesc').innerHTML='<b style="color:var(--red)">いま別の2人が通話中です。</b><br>少し待ってから、もう一度お試しください。';
}

/* === PTT（押して話す） === */
function startTx(){
  if(!joined || sending) return;
  sending=true;
  if(actualMuted){ try{ api.executeCommand('toggleAudio'); }catch(e){} }
  beep(900,.09);
  var b=document.getElementById('pttBtn');
  b.classList.add('tx');
  b.querySelector('.ico').textContent='📡';
  b.querySelector('.txt').textContent='送信中';
  document.getElementById('statusTxt').textContent='送信中…';
}
function stopTx(){
  if(!sending) return;
  sending=false;
  if(!actualMuted){ try{ api.executeCommand('toggleAudio'); }catch(e){} }
  beep(500,.08);
  var b=document.getElementById('pttBtn');
  b.classList.remove('tx');
  b.querySelector('.ico').textContent='🎙';
  b.querySelector('.txt').textContent='押して話す';
  document.getElementById('statusTxt').textContent='受信中';
}

var pttBtn=document.getElementById('pttBtn');
pttBtn.addEventListener('pointerdown', function(e){ e.preventDefault(); if(actx&&actx.state==='suspended')actx.resume(); startTx(); });
pttBtn.addEventListener('pointerup', stopTx);
pttBtn.addEventListener('pointerleave', stopTx);
pttBtn.addEventListener('pointercancel', stopTx);

function leaveRadio(){
  if(api){ try{ api.dispose(); }catch(e){} api=null; }
  joined=false; sending=false; actualMuted=true;
  document.getElementById('engine').innerHTML='';
  document.getElementById('radioScreen').classList.remove('show');
  document.getElementById('livePill').textContent='待機中';
  document.getElementById('livePill').classList.remove('live');
  document.getElementById('joinScreen').style.display='flex';
}
</script>
</body>
</html>
