<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>無線クラブ｜代行なう</title>
<style>
  :root{--bg:#070a12;--bg2:#0e1422;--line:#1d2740;--cyan:#00ffe0;--blue:#00a7ff;--txt:#eaf2ff;--sub:#8597b5;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:radial-gradient(130% 70% at 50% 0%,rgba(0,255,224,.08),transparent 60%),var(--bg);color:var(--txt);line-height:1.7;min-height:100vh}
  .top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
  .top .logo{font-size:18px;font-weight:900;display:flex;align-items:center;gap:7px}
  .back{text-decoration:none;font-size:14px;font-weight:800;color:#fff;padding:9px 16px;background:rgba(0,255,224,.15);border:1px solid var(--cyan);border-radius:999px;white-space:nowrap}
  .wrap{max-width:520px;margin:0 auto;padding:0 16px}
  /* lobby */
  .lobby{text-align:center;padding:40px 12px 30px}
  .badge{display:inline-block;font-size:11px;letter-spacing:.2em;color:var(--cyan);font-weight:800}
  .lobby h1{font-size:32px;font-weight:900;margin:8px 0 6px;text-shadow:0 0 26px rgba(0,255,224,.35)}
  .lobby p{font-size:14px;color:var(--sub);margin-bottom:8px}
  .live{display:inline-flex;align-items:center;gap:7px;margin:14px 0 26px;font-size:13px;color:var(--cyan);background:rgba(0,255,224,.07);border:1px solid rgba(0,255,224,.3);border-radius:999px;padding:7px 16px}
  .live .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:bl 1.2s infinite}
  @keyframes bl{50%{opacity:.3}}
  input{width:100%;max-width:300px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 16px;color:var(--txt);font-size:16px;outline:none;text-align:center;font-family:inherit;margin-bottom:14px}
  input:focus{border-color:var(--cyan)}
  .join{display:inline-flex;align-items:center;justify-content:center;gap:9px;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#031018;font-weight:900;font-size:18px;padding:17px 40px;border:none;border-radius:16px;cursor:pointer;box-shadow:0 10px 34px rgba(0,255,224,.35)}
  .join:active{transform:scale(.98)}
  .feat{display:flex;gap:8px;max-width:360px;margin:30px auto 0}
  .feat div{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 6px;font-size:11px;color:var(--sub)}
  .feat div b{display:block;font-size:20px;margin-bottom:4px}
  .note{font-size:12px;color:var(--sub);background:rgba(0,167,255,.06);border:1px solid rgba(0,167,255,.25);border-radius:12px;padding:12px 14px;margin:26px auto 0;max-width:380px;text-align:left}
  /* room */
  #room{padding:10px 0 20px}
  #jitsi{width:100%;height:70vh;min-height:420px;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:#000}
  .leave{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:300px;margin:14px auto 0;background:#ff3b5c;color:#fff;font-weight:900;font-size:16px;padding:15px;border:none;border-radius:14px;cursor:pointer}
  .hidden{display:none}
</style>
</head>
<body>
<div class="top">
  <div class="logo">📻 無線クラブ</div>
  <a href="index.html" class="back">← 代行なう</a>
</div>

<div class="wrap">
  <div id="lobby" class="lobby">
    <div class="badge">DAIKO NOW ・ VOICE ROOM</div>
    <h1>無線クラブ</h1>
    <p>みんなで話せる音声ルーム。<br>運転手もお客も、深夜のひまつぶしに。</p>
    <div class="live"><span class="dot"></span>入った人みんなで同時に話せます</div>
    <div><input id="name" placeholder="名前（任意）" maxlength="16"></div>
    <button class="join" onclick="join()">🎙 ルームに参加</button>
    <div class="feat">
      <div><b>🎙</b>声だけ<br>カメラ無し</div>
      <div><b>👥</b>何人でも<br>OK</div>
      <div><b>🆓</b>無料</div>
    </div>
    <div class="note">※ 参加するとマイクの使用許可を聞かれます。「許可」を押してください。カメラはオフのまま、声だけで話せます。</div>
  </div>

  <div id="room" class="hidden">
    <div id="jitsi"></div>
    <button class="leave" onclick="leave()">🚪 退出する</button>
  </div>
</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
var api=null;
function join(){
  var name=document.getElementById("name").value.trim();
  if(!name){ name="ゲスト"+Math.floor(Math.random()*1000); }
  document.getElementById("lobby").classList.add("hidden");
  document.getElementById("room").classList.remove("hidden");
  if(typeof JitsiMeetExternalAPI==="undefined"){
    alert("接続スクリプトを読み込めませんでした。電波の良い場所でページを開き直してください。");
    leave();return;
  }
  var options={
    roomName:"DaikounawMusenClub2026",
    parentNode:document.getElementById("jitsi"),
    width:"100%",height:"100%",
    userInfo:{displayName:name},
    configOverwrite:{
      startWithVideoMuted:true,
      startAudioOnly:true,
      prejoinPageEnabled:false,
      disableDeepLinking:true,
      disableInviteFunctions:true
    },
    interfaceConfigOverwrite:{
      TOOLBAR_BUTTONS:["microphone","hangup","participants-pane","settings","tileview","raisehand"],
      SHOW_JITSI_WATERMARK:false,
      SHOW_WATERMARK_FOR_GUESTS:false,
      MOBILE_APP_PROMO:false,
      DEFAULT_BACKGROUND:"#070a12"
    }
  };
  api=new JitsiMeetExternalAPI("meet.jit.si",options);
  api.addEventListener("readyToClose",leave);
}
function leave(){
  if(api){ try{api.dispose()}catch(e){} api=null; }
  document.getElementById("room").classList.add("hidden");
  document.getElementById("lobby").classList.remove("hidden");
}
</script>
</body>
</html>
